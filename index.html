<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الحضور - Attendance Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-header {
            background: linear-gradient(135deg, #2c7da0 0%, #1f5e7a 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .card-header h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .card-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .card-body {
            padding: 20px;
        }

        /* Welcome Buttons */
        .welcome-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .welcome-btn {
            flex: 1;
            padding: 15px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .welcome-btn.scanner {
            background: linear-gradient(135deg, #2c7da0 0%, #1f5e7a 100%);
            color: white;
        }

        .welcome-btn.upload {
            background: linear-gradient(135deg, #27ae60 0%, #1e8e50 100%);
            color: white;
        }

        .welcome-btn.absence {
            background: linear-gradient(135deg, #e67e22 0%, #d35400 100%);
            color: white;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f8fafc;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #eef2f6;
        }

        .stat-label {
            font-size: 10px;
            color: #64748b;
            font-weight: 500;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #2c7da0;
        }

        /* Group Stats */
        .group-stats {
            margin-bottom: 20px;
        }

        .group-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #eef2f6;
        }

        .group-title {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #2c7da0;
            display: flex;
            justify-content: space-between;
        }

        .group-stats-row {
            display: flex;
            gap: 15px;
            justify-content: space-around;
            margin-bottom: 10px;
        }

        .group-stat-item {
            text-align: center;
            flex: 1;
        }

        .group-stat-number {
            font-size: 20px;
            font-weight: 700;
        }

        .group-stat-number.present {
            color: #27ae60;
        }

        .group-stat-number.absent {
            color: #e74c3c;
        }

        .group-stat-label {
            font-size: 10px;
            color: #64748b;
        }

        .progress-bar-container {
            background: #e2e8f0;
            border-radius: 10px;
            height: 6px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-bar-fill {
            background: #27ae60;
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* Date Selector */
        .date-section {
            background: #f8fafc;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #eef2f6;
        }

        .auto-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: 0.3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #27ae60;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }

        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        /* Logs */
        .logs-container {
            background: #f8fafc;
            border-radius: 16px;
            padding: 15px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .logs-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2e8f0;
        }

        .log-entry {
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 10px;
            font-size: 12px;
            display: flex;
            gap: 10px;
            background: white;
        }

        .log-icon {
            font-size: 14px;
        }

        .log-name {
            flex: 1;
            font-weight: 500;
        }

        .log-status {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
        }

        .log-status.processing { background: #fef3c7; color: #d97706; }
        .log-status.success { background: #d1fae5; color: #059669; }
        .log-status.error { background: #fee2e2; color: #dc2626; }
        .log-status.notfound { background: #fee2e2; color: #dc2626; }
        .log-status.warning { background: #fef3c7; color: #d97706; }

        /* Buttons */
        .btn {
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }

        .btn-primary { background: #2c7da0; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .hidden { display: none; }

        /* File Upload */
        .upload-section {
            border: 2px dashed #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin: 15px 0;
        }

        .file-input-label {
            display: inline-block;
            padding: 10px 20px;
            background: #2c7da0;
            color: white;
            border-radius: 40px;
            cursor: pointer;
        }

        input[type="file"] { display: none; }

        .progress-container {
            width: 100%;
            background: #e2e8f0;
            border-radius: 10px;
            height: 6px;
            margin: 10px 0;
            display: none;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: #27ae60;
            border-radius: 10px;
            transition: width 0.3s;
        }

        #reader {
            width: 100%;
            border-radius: 16px;
            display: none;
            background: #000;
        }

        .scanner-status {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
            margin: 10px 0;
            display: none;
        }

        .processing-pulse {
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Welcome View -->
        <div class="card" id="welcomeView">
            <div class="card-header">
                <h2>⛪ نظام الحضور</h2>
                <p>Attendance Pro - نظام ذكي لإدارة الحضور</p>
            </div>
            <div class="card-body">
                <div class="welcome-buttons">
                    <button class="welcome-btn scanner" onclick="showApp('scan')">📸 مسح QR</button>
                    <button class="welcome-btn upload" onclick="showApp('upload')">📁 رفع قائمة</button>
                    <button class="welcome-btn absence" onclick="showAbsenceExport()">📋 الغياب</button>
                </div>
            </div>
        </div>

        <!-- Main App View (Scanner & Upload) -->
        <div class="card hidden" id="mainApp">
            <div class="card-header">
                <h2 id="modeTitle">الماسح الضوئي</h2>
                <p id="modeDescription">امسح رمز QR لتسجيل الحضور</p>
            </div>
            <div class="card-body">
                <!-- Group Stats Summary -->
                <div id="groupStatsContainer"></div>

                <!-- Date Selector -->
                <div class="date-section">
                    <div class="auto-toggle">
                        <span>📅 اختيار تاريخ اليوم تلقائياً</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="autoDateToggle" checked onchange="toggleAutoDate()">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <select id="dateSelect" onchange="loadGroupStats()"></select>
                </div>

                <!-- Scanner Container -->
                <div id="reader"></div>
                <div class="scanner-status" id="scannerStatus">
                    <span>📷 جاهز للمسح</span>
                </div>

                <!-- File Upload Section -->
                <div id="fileSection" class="hidden">
                    <div class="upload-section">
                        <label class="file-input-label">
                            📁 اختر ملف (.txt أو .csv)
                            <input type="file" id="fileInput" accept=".txt,.csv">
                        </label>
                        <div id="fileName" style="margin-top: 10px; font-size: 12px;">لم يتم اختيار ملف</div>
                        <div class="progress-container" id="progressContainer">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                        <button class="btn btn-success" id="uploadBtn" onclick="handleBulkUpload()" style="margin-top: 12px;">
                            🚀 بدء الرفع
                        </button>
                        <div id="uploadStats" style="font-size: 12px; color: #64748b; margin-top: 10px;"></div>
                    </div>
                </div>

                <!-- Logs -->
                <div class="logs-container">
                    <div class="logs-header">
                        <span>📋 سجل النشاط</span>
                        <button class="clear-logs" onclick="clearLogs()" style="background:none; border:none; color:#94a3b8; cursor:pointer;">مسح</button>
                    </div>
                    <div id="logsList">
                        <div class="log-entry">
                            <div class="log-icon">⏳</div>
                            <div class="log-name">جاهز للبدء</div>
                            <div class="log-status">waiting</div>
                        </div>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="button-group">
                    <button class="btn btn-primary" onclick="exportToExcel()">📊 تصدير Excel</button>
                    <button class="btn btn-secondary" onclick="resetApp()">🏠 القائمة الرئيسية</button>
                </div>
                
                <button id="syncBtn" class="btn btn-success hidden" onclick="syncQueue()" style="margin-top: 12px;">
                    📤 مزامنة (<span id="queueCount">0</span>)
                </button>
            </div>
        </div>

        <!-- Absence Export View -->
        <div class="card hidden" id="absenceView">
            <div class="card-header">
                <h2>📋 تقرير الغياب</h2>
                <p>عرض وتصدير قائمة الغياب حسب المجموعة</p>
            </div>
            <div class="card-body">
                <div class="date-section">
                    <label style="font-weight: 600;">اختر التاريخ:</label>
                    <select id="absenceDateSelect" onchange="loadAbsenceData()" style="margin-top: 10px;"></select>
                </div>

                <div id="absenceLoading" style="display: none; text-align: center; padding: 20px;">
                    <div class="processing-pulse">⏳ جاري التحميل...</div>
                </div>

                <div id="absenceGroupsContainer"></div>

                <div class="button-group" style="margin-top: 15px;">
                    <button class="btn btn-primary" id="exportAbsenceBtn" onclick="exportAbsenceToExcel()" style="display: none;">
                        📥 تصدير الغياب
                    </button>
                    <button class="btn btn-secondary" onclick="backToHome()">
                        🏠 العودة للرئيسية
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwAxnQgxbxPrG-75bKT_mqHLalPYY2fueedzKgeJSDq2Ekh0viLd8PtkV_m1cBs7bIFSg/exec",
            SHEET_ID: "1eLBj6T5M8toC9nBgZt70elYYrRjWYkdWzTkeKx-k5zA",
            MAX_RETRIES: 2,
            SYNC_INTERVAL: 5000
        };

        let appState = {
            scanner: null,
            scannedNamesSet: new Set(),
            scannedData: [],
            offlineQueue: [],
            isSyncing: false,
            currentMode: null,
            syncInterval: null,
            isProcessing: false
        };

        let absenceData = null;

        // Add Log
        function addLog(name, status, icon = '📌') {
            const logsContainer = document.getElementById('logsList');
            if (!logsContainer) return;
            
            let statusClass = '', statusText = '', statusIcon = icon;
            
            switch(status) {
                case 'processing': statusClass = 'processing'; statusText = 'processing'; statusIcon = '⏳'; break;
                case 'success': statusClass = 'success'; statusText = '✓ تم التسجيل'; statusIcon = '✅'; break;
                case 'error': statusClass = 'error'; statusText = 'خطأ'; statusIcon = '❌'; break;
                case 'notfound': statusClass = 'notfound'; statusText = 'غير موجود'; statusIcon = '🔍'; break;
                case 'already': statusClass = 'warning'; statusText = 'مسجل مسبقاً'; statusIcon = '⚠️'; break;
                case 'queued': statusClass = 'warning'; statusText = 'في قائمة الانتظار'; statusIcon = '📱'; break;
                default: statusClass = 'processing'; statusText = status;
            }
            
            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `
                <div class="log-icon">${statusIcon}</div>
                <div class="log-name">${escapeHtml(name)}</div>
                <div class="log-status ${statusClass}">${statusText}</div>
            `;
            
            logsContainer.insertBefore(logEntry, logsContainer.firstChild);
            while (logsContainer.children.length > 30) logsContainer.removeChild(logsContainer.lastChild);
        }

        function clearLogs() {
            const logsContainer = document.getElementById('logsList');
            if (logsContainer) {
                logsContainer.innerHTML = '<div class="log-entry"><div class="log-icon">⏳</div><div class="log-name">جاهز للبدء</div><div class="log-status">waiting</div></div>';
            }
        }

        // Load Group Stats
        async function loadGroupStats() {
            const date = document.getElementById('dateSelect').value;
            if (!date) return;
            
            try {
                const response = await fetchWithRetry(`${CONFIG.SCRIPT_URL}?action=getGroupStats&sheetId=${CONFIG.SHEET_ID}&date=${encodeURIComponent(date)}`);
                const stats = await response.json();
                
                if (stats.error) {
                    console.error("Error loading stats:", stats.error);
                    return;
                }
                
                renderGroupStats(stats);
            } catch (error) {
                console.error("Error loading group stats:", error);
            }
        }

        function renderGroupStats(stats) {
            const container = document.getElementById('groupStatsContainer');
            if (!container) return;
            
            const groupNames = ['رابعة بنين', 'تالتة بنين', 'رابعة بنات', 'تالتة بنات'];
            
            container.innerHTML = groupNames.map(groupName => {
                const group = stats[groupName];
                if (!group) return '';
                
                const percentage = group.percentage || 0;
                
                return `
                    <div class="group-card">
                        <div class="group-title">
                            <span>${groupName}</span>
                            <span style="font-size: 14px;">${percentage}%</span>
                        </div>
                        <div class="group-stats-row">
                            <div class="group-stat-item">
                                <div class="group-stat-number">${group.total}</div>
                                <div class="group-stat-label">العدد الكلي</div>
                            </div>
                            <div class="group-stat-item">
                                <div class="group-stat-number present">${group.present}</div>
                                <div class="group-stat-label">حاضر</div>
                            </div>
                            <div class="group-stat-item">
                                <div class="group-stat-number absent">${group.absent}</div>
                                <div class="group-stat-label">غائب</div>
                            </div>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Show App
        async function showApp(mode) {
            resetAppState();
            
            document.getElementById('welcomeView').classList.add('hidden');
            document.getElementById('absenceView').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            appState.currentMode = mode;
            
            if (mode === 'scan') {
                document.getElementById('modeTitle').innerText = '📸 الماسح الضوئي';
                document.getElementById('modeDescription').innerText = 'امسح رمز QR لتسجيل الحضور';
                document.getElementById('fileSection').classList.add('hidden');
                await loadDates();
                await loadGroupStats();
                await startScanner();
                startBackgroundSync();
                addLog('النظام', 'الماسح الضوئي جاهز', '📸');
            } else {
                document.getElementById('modeTitle').innerText = '📁 رفع قائمة';
                document.getElementById('modeDescription').innerText = 'رفع ملف لتسجيل الحضور لعدة أشخاص';
                document.getElementById('fileSection').classList.remove('hidden');
                await loadDates();
                await loadGroupStats();
                setupDragAndDrop();
                addLog('النظام', 'وضع الرفع جاهز', '📁');
            }
        }

        async function loadDates() {
            try {
                const response = await fetchWithRetry(`${CONFIG.SCRIPT_URL}?action=getDates&sheetId=${CONFIG.SHEET_ID}`);
                const dates = await response.json();
                const select = document.getElementById('dateSelect');
                select.innerHTML = dates.map(d => `<option value="${escapeHtml(d)}">📅 ${escapeHtml(d)}</option>`).join('');
                toggleAutoDate();
            } catch(e) {
                console.error("Error loading dates:", e);
                addLog('النظام', 'فشل في تحميل التواريخ', '❌');
            }
        }

        function toggleAutoDate() {
            const isAuto = document.getElementById('autoDateToggle').checked;
            const select = document.getElementById('dateSelect');
            if (isAuto && select.options.length > 0) {
                select.disabled = true;
                const todayStr = getTodayDateString();
                for (let i = 0; i < select.options.length; i++) {
                    if (select.options[i].value === todayStr) {
                        select.selectedIndex = i;
                        loadGroupStats();
                        break;
                    }
                }
            } else {
                select.disabled = false;
            }
        }

        async function startScanner() {
            if (!document.getElementById('reader')) return;
            
            document.getElementById('reader').style.display = 'block';
            document.getElementById('scannerStatus').style.display = 'block';
            
            try {
                appState.scanner = new Html5Qrcode("reader");
                await appState.scanner.start(
                    { facingMode: "environment" },
                    { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText) => {
                        if (!appState.isProcessing) {
                            processScan(decodedText.trim());
                        }
                    },
                    () => {}
                );
                document.getElementById('scannerStatus').innerHTML = '<span>📷 جاهز - وجه الكاميرا نحو رمز QR</span>';
            } catch (err) {
                addLog('النظام', 'فشل في تشغيل الكاميرا', '❌');
                document.getElementById('scannerStatus').innerHTML = '<span>❌ تعذر الوصول للكاميرا</span>';
            }
        }

        async function stopScanner() {
            if (appState.scanner && appState.scanner.isScanning) {
                try {
                    await appState.scanner.stop();
                    appState.scanner.clear();
                } catch (err) {}
            }
            appState.scanner = null;
            const readerDiv = document.getElementById('reader');
            if (readerDiv) readerDiv.style.display = 'none';
            document.getElementById('scannerStatus').style.display = 'none';
        }

        async function processScan(name, isBatch = false) {
            if (!name || appState.scannedNamesSet.has(name) || appState.isProcessing) return false;
            
            appState.isProcessing = true;
            
            if (!isBatch) {
                addLog(name, 'processing', '⏳');
                document.getElementById('scannerStatus').innerHTML = `<span class="processing-pulse">⏳ جاري التسجيل: ${escapeHtml(name)}...</span>`;
            }
            
            const currentDate = document.getElementById('dateSelect').value;
            if (!currentDate) {
                appState.isProcessing = false;
                return false;
            }
            
            try {
                const response = await fetchWithRetry(
                    `${CONFIG.SCRIPT_URL}?action=mark&sheetId=${CONFIG.SHEET_ID}&name=${encodeURIComponent(name)}&date=${encodeURIComponent(currentDate)}`,
                    1
                );
                const text = await response.text();
                
                if (text.includes("Success")) {
                    addLog(name, 'success', '✅');
                    addToScannedList(name);
                    if (!isBatch) {
                        document.getElementById('scannerStatus').innerHTML = `<span>✅ تم تسجيل: ${escapeHtml(name)}</span>`;
                        setTimeout(() => {
                            document.getElementById('scannerStatus').innerHTML = '<span>📷 جاهز - وجه الكاميرا نحو رمز QR</span>';
                        }, 1500);
                    }
                    await loadGroupStats();
                    appState.isProcessing = false;
                    return true;
                } else if (text.includes("Already Marked")) {
                    addLog(name, 'already', '⚠️');
                    if (!isBatch) {
                        document.getElementById('scannerStatus').innerHTML = `<span>⚠️ مسجل مسبقاً: ${escapeHtml(name)}</span>`;
                        setTimeout(() => {
                            document.getElementById('scannerStatus').innerHTML = '<span>📷 جاهز - وجه الكاميرا نحو رمز QR</span>';
                        }, 1500);
                    }
                    appState.isProcessing = false;
                    return false;
                } else if (text.includes("not found")) {
                    addLog(name, 'notfound', '🔍');
                    if (!isBatch) {
                        document.getElementById('scannerStatus').innerHTML = `<span>🔍 غير موجود: ${escapeHtml(name)}</span>`;
                        setTimeout(() => {
                            document.getElementById('scannerStatus').innerHTML = '<span>📷 جاهز - وجه الكاميرا نحو رمز QR</span>';
                        }, 1500);
                    }
                    appState.isProcessing = false;
                    return false;
                } else {
                    addLog(name, 'error', '❌');
                    appState.isProcessing = false;
                    return false;
                }
            } catch (error) {
                addLog(name, 'queued', '📱');
                if (!isBatch && !appState.offlineQueue.includes(name)) {
                    addToQueue(name);
                }
                appState.isProcessing = false;
                if (!isBatch) {
                    document.getElementById('scannerStatus').innerHTML = '<span>📱 غير متصل - تم الحفظ في قائمة الانتظار</span>';
                    setTimeout(() => {
                        document.getElementById('scannerStatus').innerHTML = '<span>📷 جاهز - وجه الكاميرا نحو رمز QR</span>';
                    }, 1500);
                }
                return false;
            }
        }

        function addToScannedList(name) {
            if (appState.scannedNamesSet.has(name)) return;
            
            appState.scannedNamesSet.add(name);
            appState.scannedData.unshift({ Name: name });
            document.getElementById('counter') && (document.getElementById('counter').innerText = appState.scannedNamesSet.size);
        }

        function addToQueue(name) {
            if (appState.offlineQueue.includes(name) || appState.scannedNamesSet.has(name)) return;
            appState.offlineQueue.push(name);
            updateQueueUI();
        }

        function updateQueueUI() {
            const queueCount = appState.offlineQueue.length;
            document.getElementById('queueCount') && (document.getElementById('queueCount').innerText = queueCount);
            const syncBtn = document.getElementById('syncBtn');
            if (syncBtn) {
                if (queueCount > 0) syncBtn.classList.remove('hidden');
                else syncBtn.classList.add('hidden');
            }
        }

        async function syncQueue() {
            if (appState.isSyncing || appState.offlineQueue.length === 0) return;
            
            appState.isSyncing = true;
            addLog('النظام', `جاري مزامنة ${appState.offlineQueue.length} عنصر...`, '🔄');
            
            try {
                const currentDate = document.getElementById('dateSelect').value;
                if (!currentDate) return;
                
                const toSync = [...appState.offlineQueue];
                const batchSize = 20;
                
                for (let i = 0; i < toSync.length; i += batchSize) {
                    const batch = toSync.slice(i, Math.min(i + batchSize, toSync.length));
                    
                    try {
                        const response = await fetch(`${CONFIG.SCRIPT_URL}`, {
                            method: 'POST',
                            body: JSON.stringify({
                                action: 'batchMark',
                                sheetId: CONFIG.SHEET_ID,
                                names: batch,
                                date: currentDate
                            })
                        });
                        
                        const result = await response.json();
                        
                        if (!result.error && result.success) {
                            result.success.forEach(name => {
                                if (!appState.scannedNamesSet.has(name)) {
                                    addToScannedList(name);
                                    addLog(name, 'success', '✅');
                                }
                            });
                        }
                    } catch (err) {}
                }
                
                appState.offlineQueue = [];
                updateQueueUI();
                addLog('النظام', 'تمت المزامنة بنجاح', '✅');
                await loadGroupStats();
                
            } finally {
                appState.isSyncing = false;
                updateQueueUI();
            }
        }

        function startBackgroundSync() {
            if (appState.syncInterval) clearInterval(appState.syncInterval);
            appState.syncInterval = setInterval(() => {
                if (appState.offlineQueue.length > 0 && navigator.onLine && appState.currentMode === 'scan') {
                    syncQueue();
                }
            }, CONFIG.SYNC_INTERVAL);
        }

        function setupDragAndDrop() {
            const uploadArea = document.querySelector('.upload-section');
            if (!uploadArea) return;
            
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#27ae60';
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.borderColor = '#e2e8f0';
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#e2e8f0';
                const file = e.dataTransfer.files[0];
                if (file && (file.name.endsWith('.txt') || file.name.endsWith('.csv'))) {
                    document.getElementById('fileInput').files = e.dataTransfer.files;
                    document.getElementById('fileName').innerText = file.name;
                }
            });
            
            const fileInput = document.getElementById('fileInput');
            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) {
                    document.getElementById('fileName').innerText = e.target.files[0].name;
                }
            });
        }

        async function handleBulkUpload() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) {
                alert("الرجاء اختيار ملف!");
                return;
            }
            
            try {
                const text = await file.text();
                let names = text.split(/\r?\n/)
                    .filter(line => line.trim().length > 0)
                    .map(n => n.split(',')[0].replace(/["']/g, '').trim())
                    .filter(n => n.length > 0);
                
                names = [...new Map(names.map(n => [n.toLowerCase(), n])).values()];
                
                if (names.length === 0) {
                    alert("لا توجد أسماء صالحة في الملف!");
                    return;
                }
                
                document.getElementById('progressContainer').style.display = 'block';
                const uploadBtn = document.getElementById('uploadBtn');
                uploadBtn.disabled = true;
                
                let processed = 0;
                let successful = 0;
                let alreadyMarked = 0;
                let notFound = 0;
                const startTime = Date.now();
                
                addLog('النظام', `بدء رفع ${names.length} اسم`, '📁');
                
                const batchSize = 50;
                const currentDate = document.getElementById('dateSelect').value;
                
                for (let i = 0; i < names.length; i += batchSize) {
                    const batch = names.slice(i, Math.min(i + batchSize, names.length));
                    
                    try {
                        const response = await fetch(`${CONFIG.SCRIPT_URL}`, {
                            method: 'POST',
                            body: JSON.stringify({
                                action: 'batchMark',
                                sheetId: CONFIG.SHEET_ID,
                                names: batch,
                                date: currentDate
                            })
                        });
                        
                        const result = await response.json();
                        
                        if (result.error) {
                            batch.forEach(name => addLog(name, 'error', '❌'));
                            notFound += batch.length;
                        } else {
                            (result.success || []).forEach(name => {
                                addLog(name, 'success', '✅');
                                successful++;
                            });
                            (result.alreadyMarked || []).forEach(name => {
                                addLog(name, 'already', '⚠️');
                                alreadyMarked++;
                            });
                            (result.notFound || []).forEach(name => {
                                addLog(name, 'notfound', '🔍');
                                notFound++;
                            });
                        }
                    } catch (err) {
                        batch.forEach(name => addLog(name, 'error', '❌'));
                        notFound += batch.length;
                    }
                    
                    processed += batch.length;
                    const progress = (processed / names.length) * 100;
                    document.getElementById('progressBar').style.width = `${progress}%`;
                    
                    const elapsed = (Date.now() - startTime) / 1000;
                    const speed = (processed / elapsed).toFixed(1);
                    document.getElementById('uploadStats').innerHTML = `✓ ${successful} | ⚠️ ${alreadyMarked} | 🔍 ${notFound} | ⚡ ${speed}/s`;
                }
                
                await loadGroupStats();
                
                const totalTime = ((Date.now() - startTime) / 1000).toFixed(1);
                addLog('النظام', `اكتمل الرفع: +${successful} جديد, ${alreadyMarked} مسجل مسبقاً, ${notFound} غير موجود`, '✅');
                
                uploadBtn.disabled = false;
                
                setTimeout(() => {
                    document.getElementById('progressContainer').style.display = 'none';
                    document.getElementById('progressBar').style.width = '0%';
                    document.getElementById('uploadStats').innerHTML = '';
                }, 3000);
                
            } catch (err) {
                console.error("Bulk upload error:", err);
                addLog('النظام', 'فشل الرفع: ' + err.message, '❌');
                document.getElementById('uploadBtn').disabled = false;
            }
        }

        function exportToExcel() {
            if (appState.scannedData.length === 0) {
                alert("لا توجد بيانات للتصدير!");
                return;
            }
            
            const namesList = appState.scannedData.map(item => [item.Name]);
            const wsData = [['الأسماء'], ...namesList];
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            ws['!cols'] = [{wch: 30}];
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "الحضور");
            const date = document.getElementById('dateSelect').value.replace(/\//g, '-');
            XLSX.writeFile(wb, `Attendance_${date}.xlsx`);
            addLog('النظام', `تم تصدير ${appState.scannedData.length} اسم`, '📊');
        }

        // Absence Functions
        async function showAbsenceExport() {
            document.getElementById('welcomeView').classList.add('hidden');
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('absenceView').classList.remove('hidden');
            
            await loadAbsenceDates();
        }

        async function loadAbsenceDates() {
            try {
                const response = await fetchWithRetry(`${CONFIG.SCRIPT_URL}?action=getDates&sheetId=${CONFIG.SHEET_ID}`);
                const dates = await response.json();
                const select = document.getElementById('absenceDateSelect');
                select.innerHTML = dates.map(d => `<option value="${escapeHtml(d)}">📅 ${escapeHtml(d)}</option>`).join('');
                
                const todayStr = getTodayDateString();
                for (let i = 0; i < select.options.length; i++) {
                    if (select.options[i].value === todayStr) {
                        select.selectedIndex = i;
                        break;
                    }
                }
                
                await loadAbsenceData();
            } catch(e) {
                console.error("Error loading absence dates:", e);
            }
        }

        async function loadAbsenceData() {
            const date = document.getElementById('absenceDateSelect').value;
            if (!date) return;
            
            document.getElementById('absenceLoading').style.display = 'block';
            document.getElementById('absenceGroupsContainer').innerHTML = '';
            document.getElementById('exportAbsenceBtn').style.display = 'none';
            
            try {
                const response = await fetchWithRetry(`${CONFIG.SCRIPT_URL}?action=getAllAttendance&sheetId=${CONFIG.SHEET_ID}&date=${encodeURIComponent(date)}`);
                const data = await response.json();
                
                if (data.error) {
                    document.getElementById('absenceGroupsContainer').innerHTML = `<div style="text-align:center;color:red;">${data.error}</div>`;
                    return;
                }
                
                absenceData = data;
                renderAbsenceGroups(data);
                document.getElementById('exportAbsenceBtn').style.display = 'block';
                
            } catch (error) {
                console.error("Error loading absence data:", error);
                document.getElementById('absenceGroupsContainer').innerHTML = '<div style="text-align:center;color:red;">فشل في تحميل البيانات</div>';
            } finally {
                document.getElementById('absenceLoading').style.display = 'none';
            }
        }

        function renderAbsenceGroups(data) {
            const container = document.getElementById('absenceGroupsContainer');
            if (!container) return;
            
            const groupNames = ['رابعة بنين', 'تالتة بنين', 'رابعة بنات', 'تالتة بنات'];
            
            container.innerHTML = groupNames.map(groupName => {
                const group = data.groups[groupName];
                if (!group) return '';
                
                const absentList = group.absentNames.map(name => `<div style="padding: 6px 10px; background: #fee2e2; margin: 4px 0; border-radius: 8px;">❌ ${escapeHtml(name)}</div>`).join('');
                
                return `
                    <div class="group-card" style="margin-bottom: 15px;">
                        <div class="group-title">
                            <span>${groupName}</span>
                            <span>${group.percentage}%</span>
                        </div>
                        <div class="group-stats-row">
                            <div class="group-stat-item"><div class="group-stat-number">${group.total}</div><div class="group-stat-label">العدد الكلي</div></div>
                            <div class="group-stat-item"><div class="group-stat-number present">${group.present}</div><div class="group-stat-label">حاضر</div></div>
                            <div class="group-stat-item"><div class="group-stat-number absent">${group.absent}</div><div class="group-stat-label">غائب</div></div>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" style="width: ${group.percentage}%"></div>
                        </div>
                        ${group.absent > 0 ? `<div style="margin-top: 12px;"><strong>📋 قائمة الغياب (${group.absent}):</strong><div style="margin-top: 8px;">${absentList}</div></div>` : '<div style="margin-top: 12px; color: #27ae60;">✅ جميع الطلاب حاضرون</div>'}
                    </div>
                `;
            }).join('');
        }

        function exportAbsenceToExcel() {
            if (!absenceData) return;
            
            const wsData = [['تقرير الغياب'], ['التاريخ: ' + absenceData.date], [''], ['المجموعة', 'العدد الكلي', 'الحاضر', 'الغائب', 'نسبة الحضور', 'قائمة الغياب']];
            
            const groupNames = ['رابعة بنين', 'تالتة بنين', 'رابعة بنات', 'تالتة بنات'];
            
            groupNames.forEach(groupName => {
                const group = absenceData.groups[groupName];
                if (group) {
                    wsData.push([groupName, group.total, group.present, group.absent, group.percentage + '%', group.absentNames.join(', ')]);
                }
            });
            
            wsData.push([''], ['إجمالي الحضور الكلي']);
            
            const totalAll = groupNames.reduce((sum, gn) => sum + (absenceData.groups[gn]?.total || 0), 0);
            const presentAll = groupNames.reduce((sum, gn) => sum + (absenceData.groups[gn]?.present || 0), 0);
            const absentAll = groupNames.reduce((sum, gn) => sum + (absenceData.groups[gn]?.absent || 0), 0);
            
            wsData.push(['الإجمالي', totalAll, presentAll, absentAll, ((presentAll/totalAll)*100).toFixed(1) + '%', '']);
            
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            ws['!cols'] = [{wch: 20}, {wch: 10}, {wch: 10}, {wch: 10}, {wch: 12}, {wch: 40}];
            
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "تقرير الغياب");
            XLSX.writeFile(wb, `Absence_Report_${absenceData.date.replace(/\//g, '-')}.xlsx`);
            addLog('النظام', 'تم تصدير تقرير الغياب', '📊');
        }

        function resetAppState() {
            if (appState.scanner) stopScanner();
            if (appState.syncInterval) clearInterval(appState.syncInterval);
            appState.scannedNamesSet.clear();
            appState.scannedData = [];
            appState.offlineQueue = [];
            appState.isSyncing = false;
            appState.isProcessing = false;
        }

        function resetApp() {
            resetAppState();
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('welcomeView').classList.remove('hidden');
            const fileInput = document.getElementById('fileInput');
            if (fileInput) fileInput.value = '';
            document.getElementById('fileName') && (document.getElementById('fileName').innerText = 'لم يتم اختيار ملف');
            clearLogs();
        }

        function backToHome() {
            document.getElementById('absenceView').classList.add('hidden');
            document.getElementById('welcomeView').classList.remove('hidden');
        }

        async function fetchWithRetry(url, retries = CONFIG.MAX_RETRIES) {
            for (let i = 0; i < retries; i++) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000);
                    const response = await fetch(url, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (response.ok) return response;
                    if (response.status === 429) await delay(1000);
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await delay(1000);
                }
            }
            throw new Error(`Failed after ${retries} retries`);
        }

        function getTodayDateString() {
            const now = new Date();
            return `${now.getMonth() + 1}/${now.getDate()}/${now.getFullYear()}`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        window.addEventListener('online', () => {
            if (appState.currentMode === 'scan' && appState.offlineQueue.length > 0) syncQueue();
        });

        window.addEventListener('beforeunload', () => {
            if (appState.scanner) stopScanner();
            if (appState.syncInterval) clearInterval(appState.syncInterval);
        });
    </script>
