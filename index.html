<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Pro + Auto Sync</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --csv: #f39c12; --warning: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; background: #f0f2f5; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #f8f9fa; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
        .stat-val { font-size: 20px; font-weight: bold; color: var(--primary); }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-scan { background: var(--primary); }
        .btn-csv { background: var(--csv); }
        .btn-sync { background: var(--warning); display: none; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #reader { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
        #status { margin-top: 10px; padding: 12px; border-radius: 8px; font-weight: bold; min-height: 20px; }
        .list-container { margin-top: 20px; text-align: right; background: #fff; border-radius: 10px; padding: 10px; border: 1px solid #eee; }
        #scannedList { list-style: none; padding: 0; margin: 0; max-height: 150px; overflow-y: auto; }
        #scannedList li { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 13px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .offline { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<div class="card">
    <h2>Attendance Pro ⛪</h2>

    <div class="stats-grid">
        <div class="stat-box"><div>Present</div><span id="counter" class="stat-val">0</span></div>
        <div class="stat-box"><div>In Queue</div><span id="queueCounter" class="stat-val">0</span></div>
    </div>

    <select id="dateSelect" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px;"></select>
    
    <button class="btn-scan" onclick="startScanner()">Open Scanner</button>
    <button id="syncBtn" class="btn-sync" onclick="syncQueue()">Attempting to Reconnect...</button>
    <button class="btn-csv" onclick="exportToCSV()">📥 Export List (.CSV)</button>

    <div id="reader"></div>
    <div id="status">Ready</div>

    <div class="list-container">
        <strong>Scanned Names Today:</strong>
        <ul id="scannedList"></ul>
    </div>
</div>

<script>
    const MY_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwAxnQgxbxPrG-75bKT_mqHLalPYY2fueedzKgeJSDq2Ekh0viLd8PtkV_m1cBs7bIFSg/exec"; 
    const MY_SHEET_ID = "1eLBj6T5M8toC9nBgZt70elYYrRjWYkdWzTkeKx-k5zA";

    let scannedNames = new Set(); 
    let offlineQueue = [];
    let isSyncing = false;

    window.onload = async () => {
        try {
            const resp = await fetch(`${MY_SCRIPT_URL}?action=getDates&sheetId=${MY_SHEET_ID}`);
            const dates = await resp.json();
            document.getElementById('dateSelect').innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
        } catch(e) { document.getElementById('status').innerText = "Offline Mode Active"; }
        
        // HEARTBEAT: Check queue every 5 seconds
        setInterval(syncQueue, 5000);
    };

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (name) => processScan(name.trim()));
    }

    async function processScan(name) {
        if (scannedNames.has(name)) {
            setStatus("Already Scanned: " + name, "error");
            return;
        }

        setStatus("Processing: " + name, "");

        try {
            const res = await fetch(`${MY_SCRIPT_URL}?action=mark&sheetId=${MY_SHEET_ID}&name=${encodeURIComponent(name)}&date=${encodeURIComponent(document.getElementById('dateSelect').value)}`);
            const text = await res.text();
            
            if (text.includes("Success") || text.includes("Already Marked")) {
                addToList(name);
                setStatus(text, "success");
            } else {
                setStatus(text, "error");
            }
        } catch (e) {
            addToQueue(name);
        }
    }

    function setStatus(msg, className) {
        const s = document.getElementById('status');
        s.className = className;
        s.innerText = msg;
    }

    function addToList(name) {
        if(scannedNames.has(name)) return;
        scannedNames.add(name);
        document.getElementById('counter').innerText = scannedNames.size;
        const li = document.createElement('li');
        li.innerHTML = `<span>${new Date().toLocaleTimeString()}</span> <strong>${name}</strong>`;
        document.getElementById('scannedList').prepend(li);
    }

    function addToQueue(name) {
        if(offlineQueue.includes(name) || scannedNames.has(name)) return;
        offlineQueue.push(name);
        updateQueueUI();
        setStatus("Offline! Saved to Queue: " + name, "offline");
    }

    function updateQueueUI() {
        document.getElementById('queueCounter').innerText = offlineQueue.length;
        document.getElementById('syncBtn').style.display = offlineQueue.length > 0 ? 'block' : 'none';
    }

    async function syncQueue() {
        if (isSyncing || offlineQueue.length === 0) return;
        isSyncing = true;
        
        const nameToSync = offlineQueue[0];
        try {
            const res = await fetch(`${MY_SCRIPT_URL}?action=mark&sheetId=${MY_SHEET_ID}&name=${encodeURIComponent(nameToSync)}&date=${encodeURIComponent(document.getElementById('dateSelect').value)}`);
            if (res.ok) {
                const text = await res.text();
                if (text.includes("Success") || text.includes("Already Marked")) {
                    offlineQueue.shift(); // Remove from queue
                    addToList(nameToSync);
                    updateQueueUI();
                    setStatus("Synced: " + nameToSync, "success");
                }
            }
        } catch (e) { console.log("Still offline, retrying later..."); }
        
        isSyncing = false;
    }

    function exportToCSV() {
        if (scannedNames.size === 0) return alert("No names to export!");
        let csvContent = "data:text/csv;charset=utf-8,Name,Scan Time\n";
        scannedNames.forEach(name => {
            csvContent += `"${name}","${new Date().toLocaleTimeString()}"\n`;
        });
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", `Attendance_${document.getElementById('dateSelect').value}.csv`);
        link.click();
    }
</script>

</body>
</html>
