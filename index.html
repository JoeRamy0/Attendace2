<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Pro,Youssef Ramy</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --excel: #1f7244; --pdf: #e74c3c; --warning: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; background: #f0f2f5; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #f8f9fa; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
        .stat-val { font-size: 20px; font-weight: bold; color: var(--primary); }

        .date-container { background: #edf2f7; padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: left; }
        .auto-toggle { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 14px; font-weight: bold; }
        
        select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-size: 15px; font-weight: bold; cursor: pointer; color: white; }
        select { color: #333; border: 1px solid #ddd; cursor: default; }

        .btn-scan { background: var(--primary); }
        .export-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-excel { background: var(--excel); }
        .btn-pdf { background: var(--pdf); }
        .btn-sync { background: var(--warning); display: none; }

        #reader { width: 100%; border-radius: 10px; margin-top: 10px; display: none; border: 2px solid var(--primary); }
        #status { margin-top: 10px; padding: 12px; border-radius: 8px; font-weight: bold; min-height: 20px; }
        
        .list-container { margin-top: 20px; text-align: right; background: #fff; border-radius: 10px; padding: 10px; border: 1px solid #eee; }
        #scannedList { list-style: none; padding: 0; margin: 0; max-height: 180px; overflow-y: auto; }
        #scannedList li { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 13px; }
        
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .offline { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<div class="card">
    <h2>St Joseph Attendance Pro ⛪</h2>
    <h4>Created by:Youssef Ramy</h4> 

    <div class="stats-grid">
        <div class="stat-box"><div>Present</div><span id="counter" class="stat-val">0</span></div>
        <div class="stat-box"><div>In Queue</div><span id="queueCounter" class="stat-val">0</span></div>
    </div>

    <div class="date-container">
        <div class="auto-toggle">
            <span>Auto-Select Today</span>
            <input type="checkbox" id="autoDateToggle" checked onchange="toggleAutoDate()">
        </div>
        <select id="dateSelect"></select>
    </div>
    
    <button class="btn-scan" onclick="startScanner()">Open Scanner</button>
    <button id="syncBtn" class="btn-sync" onclick="syncQueue()">Syncing Queue...</button>

    <div class="export-grid">
        <button class="btn-excel" onclick="exportToExcel()">📊 Excel</button>
        <button class="btn-pdf" onclick="exportToPDF()">📕 PDF</button>
    </div>

    <div id="reader"></div>
    <div id="status">Ready</div>

    <div class="list-container">
        <strong>Scanned Names Today:</strong>
        <ul id="scannedList"></ul>
    </div>
</div>

<script>
    const MY_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwAxnQgxbxPrG-75bKT_mqHLalPYY2fueedzKgeJSDq2Ekh0viLd8PtkV_m1cBs7bIFSg/exec"; //----------------------------------------------------------
    const MY_SHEET_ID = "1eLBj6T5M8toC9nBgZt70elYYrRjWYkdWzTkeKx-k5zA";//-----------------------------------------------------------------------------------------------------------------------------------

    let scannedData = []; // Store objects for better export: {name, time}
    let scannedNamesSet = new Set(); 
    let offlineQueue = [];
    let isSyncing = false;

    window.onload = async () => {
        try {
            const resp = await fetch(`${MY_SCRIPT_URL}?action=getDates&sheetId=${MY_SHEET_ID}`);
            const dates = await resp.json();
            const select = document.getElementById('dateSelect');
            select.innerHTML = dates.map(d => `<option value="${d.trim()}">${d.trim()}</option>`).join('');
            toggleAutoDate();
        } catch(e) { setStatus("Offline Mode Active", "offline"); }
        setInterval(syncQueue, 5000);
    };

    function toggleAutoDate() {
        const isAuto = document.getElementById('autoDateToggle').checked;
        const select = document.getElementById('dateSelect');
        if (isAuto && select.options.length > 0) {
            select.disabled = true; select.style.opacity = "0.6";
            const now = new Date();
            const todayKey = now.getFullYear() + "-" + (now.getMonth() + 1) + "-" + now.getDate();
            let found = false;
            for (let i = 0; i < select.options.length; i++) {
                let optDate = new Date(select.options[i].value.trim());
                if (!isNaN(optDate)) {
                    const optKey = optDate.getFullYear() + "-" + (optDate.getMonth() + 1) + "-" + optDate.getDate();
                    if (todayKey === optKey) { select.selectedIndex = i; found = true; break; }
                }
            }
            if(found) setStatus("Auto-selected: " + select.value, "success");
            else setStatus("Today's date not found.", "error");
        } else { select.disabled = false; select.style.opacity = "1"; }
    }

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (name) => processScan(name.trim()));
    }

    async function processScan(name) {
        if (scannedNamesSet.has(name)) { setStatus("Already Scanned: " + name, "error"); return; }
        setStatus("Processing: " + name, "");
        try {
            const res = await fetch(`${MY_SCRIPT_URL}?action=mark&sheetId=${MY_SHEET_ID}&name=${encodeURIComponent(name)}&date=${encodeURIComponent(document.getElementById('dateSelect').value)}`);
            const text = await res.text();
            if (text.includes("Success") || text.includes("Already Marked")) {
                addToList(name);
                setStatus(text, "success");
            } else { setStatus(text, "error"); }
        } catch (e) { addToQueue(name); }
    }

    function addToList(name) {
        if(scannedNamesSet.has(name)) return;
        const time = new Date().toLocaleTimeString();
        scannedNamesSet.add(name);
        scannedData.push({ Name: name, Time: time });
        
        document.getElementById('counter').innerText = scannedNamesSet.size;
        const li = document.createElement('li');
        li.innerHTML = `<span>${time}</span> <strong>${name}</strong>`;
        document.getElementById('scannedList').prepend(li);
    }

    function setStatus(msg, className) {
        const s = document.getElementById('status');
        s.className = className; s.innerText = msg;
    }

    // --- EXPORT FUNCTIONS ---

    function exportToExcel() {
        if (scannedData.length === 0) return alert("No data to export!");
        const ws = XLSX.utils.json_to_sheet(scannedData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Attendance");
        XLSX.writeFile(wb, `Attendance_${document.getElementById('dateSelect').value}.xlsx`);
    }

    function exportToPDF() {
        if (scannedData.length === 0) return alert("No data to export!");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.text(`Attendance Report: ${document.getElementById('dateSelect').value}`, 14, 15);
        
        const rows = scannedData.map(item => [item.Name, item.Time]);
        doc.autoTable({
            head: [['Name', 'Time']],
            body: rows,
            startY: 20,
            theme: 'striped'
        });
        
        doc.save(`Attendance_${document.getElementById('dateSelect').value}.pdf`);
    }

    // --- QUEUE LOGIC ---
    function addToQueue(name) {
        if(offlineQueue.includes(name) || scannedNamesSet.has(name)) return;
        offlineQueue.push(name);
        updateQueueUI();
        setStatus("Offline! Saved to Queue", "offline");
    }

    function updateQueueUI() {
        document.getElementById('queueCounter').innerText = offlineQueue.length;
        document.getElementById('syncBtn').style.display = offlineQueue.length > 0 ? 'block' : 'none';
    }

    async function syncQueue() {
        if (isSyncing || offlineQueue.length === 0) return;
        isSyncing = true;
        const nameToSync = offlineQueue[0];
        try {
            const res = await fetch(`${MY_SCRIPT_URL}?action=mark&sheetId=${MY_SHEET_ID}&name=${encodeURIComponent(nameToSync)}&date=${encodeURIComponent(document.getElementById('dateSelect').value)}`);
            if (res.ok) { offlineQueue.shift(); addToList(nameToSync); updateQueueUI(); }
        } catch (e) {}
        isSyncing = false;
    }
</script>

</body>
</html>
