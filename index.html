<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Pro v5</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --excel: #1f7244; --pdf: #e74c3c; --warning: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; background: #f0f2f5; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        #welcomeView { display: flex; flex-direction: column; gap: 15px; padding-top: 50px; }
        .welcome-btn { padding: 30px; font-size: 20px; border-radius: 15px; border: none; color: white; cursor: pointer; font-weight: bold; }
        #mainApp { display: none; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #f8f9fa; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
        .stat-val { font-size: 22px; font-weight: bold; color: var(--primary); }
        .date-container { background: #edf2f7; padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: left; }
        select, button, input[type="file"] { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; font-weight: bold; box-sizing: border-box; }
        button { border: none; cursor: pointer; color: white; }
        #status { margin-top: 10px; padding: 15px; border-radius: 8px; font-weight: bold; min-height: 24px; font-size: 14px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        .list-container { margin-top: 20px; text-align: right; background: #fff; border-radius: 10px; padding: 10px; border: 1px solid #eee; }
        #scannedList { list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; }
        #scannedList li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 13px; }
    </style>
</head>
<body>

<div class="card">
    <div id="welcomeView">
        <h2>Attendance Pro ⛪</h2>
        <button class="welcome-btn" style="background:var(--primary)" onclick="showApp('scan')">📸 Start QR Scanning</button>
        <button class="welcome-btn" style="background:var(--success)" onclick="showApp('upload')">📁 Upload Name List</button>
    </div>

    <div id="mainApp">
        <h2 id="modeTitle">Scanner Mode</h2>
        <div class="stats-grid">
            <div class="stat-box"><div>Present</div><span id="counter" class="stat-val">0</span></div>
            <div class="stat-box"><div>In Queue</div><span id="queueCounter" class="stat-val">0</span></div>
        </div>

        <div class="date-container">
            <select id="dateSelect"></select>
        </div>
        
        <div id="fileSection" style="display:none; padding:10px; border:2px dashed #ccc; border-radius:10px;">
            <input type="file" id="fileInput" accept=".txt,.csv">
            <button style="background:var(--success)" onclick="handleBulkUpload()">🚀 Process Bulk Upload</button>
        </div>

        <div id="reader"></div>
        <div id="status">System Ready</div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px;">
            <button style="background:var(--excel)" onclick="exportToExcel()">📊 Excel</button>
            <button style="background:var(--pdf)" onclick="exportToPDF()">📕 PDF</button>
        </div>
        <button onclick="location.reload()" style="background:#666; font-size: 12px; margin-top: 10px;">⬅ Back</button>
        <div class="list-container"><strong>Activity History:</strong><ul id="scannedList"></ul></div>
    </div>
</div>

<script>
    const MY_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwAxnQgxbxPrG-75bKT_mqHLalPYY2fueedzKgeJSDq2Ekh0viLd8PtkV_m1cBs7bIFSg/exec"; 
    const MY_SHEET_ID = "1eLBj6T5M8toC9nBgZt70elYYrRjWYkdWzTkeKx-k5zA";

    let scannedData = [];
    let scannedNamesSet = new Set(); 

    async function showApp(mode) {
        document.getElementById('welcomeView').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        await loadDates();
        if (mode === 'scan') {
            document.getElementById('modeTitle').innerText = "📸 QR Scanner";
            startScanner();
        } else {
            document.getElementById('modeTitle').innerText = "📁 Bulk Upload";
            document.getElementById('fileSection').style.display = 'block';
        }
    }

    async function loadDates() {
        try {
            const resp = await fetch(`${MY_SCRIPT_URL}?action=getDates&sheetId=${MY_SHEET_ID}`);
            const dates = await resp.json();
            const select = document.getElementById('dateSelect');
            select.innerHTML = dates.map(d => `<option value="${d.trim()}">${d.trim()}</option>`).join('');
        } catch(e) { setStatus("Error loading dates", "error"); }
    }

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (name) => processScan(name.trim()));
    }

    async function handleBulkUpload() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return alert("Select a file!");
        
        const text = await file.text();
        const names = text.split(/\r?\n/).map(n => n.trim()).filter(n => n.length > 0);
        
        setStatus(`Processing 0 / ${names.length}`, "warning");
        
        for (let i = 0; i < names.length; i++) {
            setStatus(`Processing ${i + 1} / ${names.length}: ${names[i]}`, "warning");
            await processScan(names[i]); // We "await" so it doesn't flood Google
        }
        setStatus("Bulk Upload Finished!", "success");
    }

    async function processScan(name) {
        if (scannedNamesSet.has(name)) return;
        try {
            const date = document.getElementById('dateSelect').value;
            const res = await fetch(`${MY_SCRIPT_URL}?action=mark&sheetId=${MY_SHEET_ID}&name=${encodeURIComponent(name)}&date=${encodeURIComponent(date)}`);
            const msg = await res.text();
            if (msg.includes("Success") || msg.includes("Already Marked")) {
                addToList(name);
                setStatus(msg, "success");
            } else {
                setStatus(msg, "error");
            }
        } catch (e) { setStatus("Network Error: " + name, "error"); }
    }

    function addToList(name) {
        if(scannedNamesSet.has(name)) return;
        const time = new Date().toLocaleTimeString();
        scannedNamesSet.add(name);
        scannedData.push({ Name: name, Time: time });
        document.getElementById('counter').innerText = scannedNamesSet.size;
        const li = document.createElement('li');
        li.innerHTML = `<span>${time}</span> <strong>${name}</strong>`;
        document.getElementById('scannedList').prepend(li);
    }

    function setStatus(msg, className) {
        const s = document.getElementById('status');
        s.className = className; s.innerText = msg;
    }

    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(scannedData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Attendance");
        XLSX.writeFile(wb, "Attendance.xlsx");
    }

    function exportToPDF() {
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text(`Attendance Report - ${document.getElementById('dateSelect').value}`, 10, 10);
            
            const rows = scannedData.map(item => [item.Time, item.Name]);
            doc.autoTable({
                head: [['Time', 'Name']],
                body: rows,
                startY: 20,
                // If Arabic is needed, it will appear as blocks unless you embed a font locally.
                // For now, this fixes the "Generation Error".
            });
            doc.save("Attendance.pdf");
        } catch(e) { alert("PDF Error: Try Excel export instead."); }
    }
</script>

</body>
</html>
