<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>St. Joseph Attendance Pro</title>
    <!-- Load only what's needed, defer non-critical -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/dist/html5-qrcode.min.js" defer></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js" defer></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 12px;
            position: relative;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .card {
            background: rgba(255,255,255,0.98);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 16px;
            backdrop-filter: blur(0px);
        }

        /* Login View */
        #loginView .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 32px 24px;
            text-align: center;
        }

        .app-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
        .app-subtitle { font-size: 11px; opacity: 0.8; margin-top: 6px; }
        .creator-credit { font-size: 9px; opacity: 0.7; margin-top: 10px; }

        .login-form { padding: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: #1e293b; font-size: 13px; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            background: #f8fafc;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .login-btn:active { transform: scale(0.98); }

        /* Welcome View */
        #welcomeView .card-header {
            background: linear-gradient(135deg, #2c7da0 0%, #1f5e7a 100%);
            color: white;
            padding: 20px 16px;
            text-align: center;
        }
        .welcome-app-title { font-size: 22px; font-weight: 700; }

        /* User Profile */
        .user-profile {
            background: #f8fafc;
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2c7da0 0%, #1f5e7a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            color: white;
        }
        .user-details { flex: 1; }
        .user-name { font-size: 16px; font-weight: 700; color: #1e293b; }
        .user-email { font-size: 10px; color: #64748b; }
        .user-role-badge {
            display: inline-block;
            background: #2c7da0;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 9px;
            margin-top: 4px;
        }
        .logout-btn-side {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
        }

        /* Sheet Selector */
        .sheet-selector {
            background: #f8fafc;
            border-radius: 18px;
            padding: 12px;
            margin-bottom: 16px;
        }
        .current-sheet {
            background: linear-gradient(135deg, #2c7da0 0%, #1f5e7a 100%);
            color: white;
            padding: 8px;
            border-radius: 12px;
            font-size: 11px;
            text-align: center;
            margin-bottom: 10px;
        }
        .sheet-list { max-height: 250px; overflow-y: auto; }
        .sheet-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: white;
            border-radius: 12px;
            margin-bottom: 6px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
        }
        .sheet-item.active { background: #eef2ff; border-color: #667eea; }
        .sheet-name { font-weight: 600; font-size: 13px; }
        .sheet-details { font-size: 9px; color: #64748b; }
        .access-badge { padding: 2px 8px; border-radius: 12px; font-size: 9px; font-weight: 600; }
        .access-badge.full { background: #d1fae5; color: #059669; }

        /* Welcome Buttons */
        .welcome-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .welcome-btn {
            flex: 1;
            padding: 12px 6px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-align: center;
        }
        .welcome-btn .btn-icon { font-size: 20px; display: block; margin-bottom: 4px; }
        .welcome-btn.scanner { background: linear-gradient(135deg, #2c7da0 0%, #1f5e7a 100%); color: white; }
        .welcome-btn.upload { background: linear-gradient(135deg, #27ae60 0%, #1e8e50 100%); color: white; }
        .welcome-btn.absence { background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); color: white; }
        .welcome-btn.disabled { opacity: 0.5; cursor: not-allowed; }

        /* Cards */
        .group-card {
            background: #f8fafc;
            border-radius: 14px;
            padding: 10px;
            margin-bottom: 8px;
        }
        .group-title { font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; }
        .group-stats { display: flex; gap: 12px; justify-content: space-around; margin: 8px 0; }
        .stat-number { font-size: 18px; font-weight: 700; }
        .stat-number.present { color: #27ae60; }
        .stat-number.absent { color: #e74c3c; }
        .stat-label { font-size: 9px; color: #64748b; }
        .progress-bar { background: #e2e8f0; border-radius: 6px; height: 4px; overflow: hidden; }
        .progress-fill { background: #27ae60; height: 100%; transition: width 0.2s; }

        .date-section {
            background: #f8fafc;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .auto-toggle { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: 0.2s;
            border-radius: 20px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            border-radius: 50%;
            transition: 0.2s;
        }
        input:checked + .toggle-slider { background-color: #27ae60; }
        input:checked + .toggle-slider:before { transform: translateX(20px); }

        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 13px;
            background: white;
        }

        .logs-container {
            background: #f8fafc;
            border-radius: 14px;
            padding: 10px;
            margin: 12px 0;
            max-height: 180px;
            overflow-y: auto;
        }
        .log-entry {
            padding: 6px;
            margin-bottom: 4px;
            border-radius: 8px;
            font-size: 11px;
            display: flex;
            gap: 8px;
            background: white;
        }

        .btn {
            padding: 10px;
            border: none;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }
        .btn-primary { background: linear-gradient(135deg, #2c7da0 0%, #1f5e7a 100%); color: white; }
        .btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }

        .hidden { display: none; }
        #reader { width: 100%; border-radius: 14px; display: none; background: #000; margin: 10px 0; }
        .scanner-status { background: #f1f5f9; padding: 10px; border-radius: 12px; text-align: center; font-size: 12px; margin: 10px 0; display: none; }
        .upload-section { border: 2px dashed #e2e8f0; border-radius: 14px; padding: 16px; text-align: center; margin: 12px 0; }
        .file-input-label {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, #2c7da0 0%, #1f5e7a 100%);
            color: white;
            border-radius: 40px;
            cursor: pointer;
            font-size: 12px;
        }
        input[type="file"] { display: none; }
        .progress-container { background: #e2e8f0; border-radius: 6px; height: 4px; margin: 8px 0; display: none; }
        .progress-bar { width: 0%; height: 100%; background: #27ae60; border-radius: 6px; transition: width 0.2s; }
        .processing-pulse { animation: pulse 0.8s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .card-body { padding: 16px; }
        #groupStatsContainer { margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login View -->
        <div class="card" id="loginView">
            <div class="card-header">
                <div class="app-title">⛪ St. Joseph</div>
                <div class="app-subtitle">Attendance Pro</div>
                <div class="creator-credit">Youssef Ramy</div>
            </div>
            <div class="login-form">
                <div id="loginError" class="error-message hidden"></div>
                <div class="form-group">
                    <label>👤 Username</label>
                    <input type="text" id="username" placeholder="Username">
                </div>
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" placeholder="Email">
                </div>
                <button class="login-btn" onclick="login()">🔐 Login</button>
            </div>
        </div>

        <!-- Welcome View -->
        <div class="card hidden" id="welcomeView">
            <div class="card-header">
                <div class="welcome-app-title">⛪ Attendance Pro</div>
                <div class="welcome-creator">Youssef Ramy</div>
            </div>
            <div class="card-body">
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <div class="user-details">
                        <div class="user-name" id="displayName"></div>
                        <div class="user-email" id="displayEmail"></div>
                        <div class="user-role-badge" id="displayRole"></div>
                    </div>
                    <button class="logout-btn-side" onclick="logout()">🚪</button>
                </div>

                <div class="sheet-selector">
                    <div id="currentSheetDisplay" class="current-sheet"></div>
                    <div id="sheetListContainer"></div>
                </div>

                <div class="welcome-buttons">
                    <button class="welcome-btn scanner" id="scannerBtn" onclick="showApp('scan')"><div class="btn-icon">📸</div><div>Scan</div></button>
                    <button class="welcome-btn upload" id="uploadBtn" onclick="showApp('upload')"><div class="btn-icon">📁</div><div>Upload</div></button>
                    <button class="welcome-btn absence" id="absenceBtn" onclick="showAbsenceExport()"><div class="btn-icon">📋</div><div>Absent</div></button>
                </div>
            </div>
        </div>

        <!-- Main App View -->
        <div class="card hidden" id="mainApp">
            <div class="card-header">
                <h2 id="modeTitle" style="font-size: 18px;">Scanner</h2>
                <div id="activeSheetInfo" style="font-size: 10px;"></div>
            </div>
            <div class="card-body">
                <div id="groupStatsContainer"></div>
                
                <div class="date-section">
                    <div class="auto-toggle">
                        <span>📅 Auto today</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="autoDateToggle" checked onchange="toggleAutoDate()">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <select id="dateSelect" onchange="onDateManuallySelected()"></select>
                </div>

                <div id="reader"></div>
                <div class="scanner-status" id="scannerStatus">📷 Ready</div>

                <div id="fileSection" class="hidden">
                    <div class="upload-section">
                        <label class="file-input-label">📁 Choose File<input type="file" id="fileInput" accept=".txt,.csv"></label>
                        <div class="progress-container" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>
                        <button class="btn btn-primary" id="uploadBtnAction" onclick="handleBulkUpload()" style="margin-top: 8px;">🚀 Upload</button>
                        <div id="uploadStats" style="font-size: 10px; margin-top: 6px;"></div>
                    </div>
                </div>

                <div class="logs-container">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 6px;"><span>📋 Log</span><button onclick="clearLogs()" style="background:none; border:none; font-size: 11px;">Clear</button></div>
                    <div id="logsList"><div class="log-entry"><span>⏳</span><span>Ready</span></div></div>
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" onclick="exportToExcel()">📊 Export</button>
                    <button class="btn btn-secondary" onclick="backToWelcome()">🏠 Back</button>
                </div>
                <button id="syncBtn" class="btn btn-primary hidden" onclick="syncQueue()" style="margin-top: 8px;">📤 Sync (<span id="queueCount">0</span>)</button>
            </div>
        </div>

        <!-- Absence View -->
        <div class="card hidden" id="absenceView">
            <div class="card-header"><h2 style="font-size: 18px;">📋 Absence</h2><div id="absenceSheetInfo" style="font-size: 10px;"></div></div>
            <div class="card-body">
                <div class="date-section">
                    <select id="absenceDateSelect" onchange="loadAbsenceData()"></select>
                </div>
                <div id="absenceLoading" style="display:none; text-align:center; padding:16px;">⏳ Loading...</div>
                <div id="absenceGroupsContainer"></div>
                <div class="button-group" style="margin-top: 12px;">
                    <button class="btn btn-primary" id="exportAbsenceBtn" onclick="exportAbsenceToExcel()" style="display:none;">📥 Export</button>
                    <button class="btn btn-secondary" onclick="backToWelcome()">🏠 Back</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ CONFIGURATION ============
        const AUTH_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxFSTDYPIg6wSk1i5fiC0uH2zi6R7vgOeSEVy-NliLN_5V2_B061DEyKqLADp8itHsR6w/exec';
        const STORAGE_USER_KEY = 'attendance_user';
        
        // Cache DOM elements
        const DOM = {
            loginView: () => document.getElementById('loginView'),
            welcomeView: () => document.getElementById('welcomeView'),
            mainApp: () => document.getElementById('mainApp'),
            absenceView: () => document.getElementById('absenceView'),
            dateSelect: () => document.getElementById('dateSelect'),
            absenceDateSelect: () => document.getElementById('absenceDateSelect'),
            groupStatsContainer: () => document.getElementById('groupStatsContainer'),
            absenceGroupsContainer: () => document.getElementById('absenceGroupsContainer'),
            logsList: () => document.getElementById('logsList'),
            scannerStatus: () => document.getElementById('scannerStatus'),
            syncBtn: () => document.getElementById('syncBtn'),
            queueCount: () => document.getElementById('queueCount')
        };
        
        let allSheets = [], currentUser = null, currentSheet = null, currentAccess = null, currentGroups = [];
        let appState = { scanner: null, scannedNamesSet: new Set(), scannedData: [], offlineQueue: [], isSyncing: false, currentMode: null, syncInterval: null, isProcessing: false };
        let absenceData = null, statsCache = {}, datesCache = {};
        
        // ============ AUTHENTICATION ============
        async function login() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const errorDiv = document.getElementById('loginError');
            
            if (!username || !email) {
                errorDiv.classList.remove('hidden');
                errorDiv.innerHTML = '❌ Enter username and email';
                return;
            }
            
            try {
                const response = await fetch(`${AUTH_SCRIPT_URL}?action=login&username=${encodeURIComponent(username)}&email=${encodeURIComponent(email)}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                currentUser = data.user;
                allSheets = data.sheets;
                localStorage.setItem(STORAGE_USER_KEY, JSON.stringify({ username: currentUser.username, email: currentUser.email, role: currentUser.role }));
                
                if (allSheets.length) { currentSheet = allSheets[0]; currentAccess = currentSheet.access; currentGroups = currentSheet.groups; }
                
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('welcomeView').classList.remove('hidden');
                document.getElementById('userAvatar').innerHTML = currentUser.username.charAt(0).toUpperCase();
                document.getElementById('displayName').innerHTML = currentUser.username;
                document.getElementById('displayEmail').innerHTML = currentUser.email;
                document.getElementById('displayRole').innerHTML = currentUser.role;
                
                loadUserSheets();
                addLog('System', `Welcome ${currentUser.username}`, '✅');
            } catch (err) {
                errorDiv.classList.remove('hidden');
                errorDiv.innerHTML = `❌ ${err.message}`;
            }
        }
        
        function logout() {
            if (appState.scanner) { try { appState.scanner.stop(); } catch(e) {} appState.scanner = null; }
            if (appState.syncInterval) clearInterval(appState.syncInterval);
            currentUser = null; allSheets = []; currentSheet = null;
            localStorage.removeItem(STORAGE_USER_KEY);
            document.getElementById('welcomeView').classList.add('hidden');
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('absenceView').classList.add('hidden');
            document.getElementById('loginView').classList.remove('hidden');
        }
        
        function checkSavedSession() {
            const saved = localStorage.getItem(STORAGE_USER_KEY);
            if (saved) {
                const session = JSON.parse(saved);
                fetch(`${AUTH_SCRIPT_URL}?action=login&username=${encodeURIComponent(session.username)}&email=${encodeURIComponent(session.email)}`)
                    .then(res => res.json()).then(data => {
                        if (!data.error) {
                            currentUser = data.user;
                            allSheets = data.sheets;
                            if (allSheets.length) { currentSheet = allSheets[0]; currentAccess = currentSheet.access; currentGroups = currentSheet.groups; }
                            document.getElementById('loginView').classList.add('hidden');
                            document.getElementById('welcomeView').classList.remove('hidden');
                            document.getElementById('userAvatar').innerHTML = currentUser.username.charAt(0).toUpperCase();
                            document.getElementById('displayName').innerHTML = currentUser.username;
                            document.getElementById('displayEmail').innerHTML = currentUser.email;
                            document.getElementById('displayRole').innerHTML = currentUser.role;
                            loadUserSheets();
                            addLog('System', `Welcome back ${currentUser.username}`, '✅');
                        } else logout();
                    }).catch(() => logout());
            }
        }
        
        function loadUserSheets() {
            const container = document.getElementById('sheetListContainer');
            const currentDisplay = document.getElementById('currentSheetDisplay');
            if (!currentUser || !allSheets.length) {
                container.innerHTML = '<div style="text-align:center;padding:12px;">No sheets</div>';
                return;
            }
            if (!currentSheet || !allSheets.some(s => s.sheetId === currentSheet.sheetId)) {
                currentSheet = allSheets[0];
                currentAccess = currentSheet.access;
                currentGroups = currentSheet.groups;
            }
            currentDisplay.innerHTML = `📄 ${currentSheet.name} (${currentGroups.length} groups)`;
            container.innerHTML = allSheets.map((sheet, idx) => `
                <div class="sheet-item ${currentSheet.sheetId === sheet.sheetId ? 'active' : ''}" onclick="selectSheet(${idx})">
                    <div><div class="sheet-name">${escapeHtml(sheet.name)}</div><div class="sheet-details">${sheet.groups.length} groups</div></div>
                    <div class="access-badge full">${sheet.access === 'full' ? 'Full' : 'View'}</div>
                </div>
            `).join('');
        }
        
        function selectSheet(idx) {
            currentSheet = allSheets[idx];
            currentAccess = currentSheet.access;
            currentGroups = currentSheet.groups;
            loadUserSheets();
            addLog('System', `Switched to ${currentSheet.name}`, '🔄');
            if (!document.getElementById('mainApp').classList.contains('hidden')) { loadDates(); loadGroupStats(); }
            if (!document.getElementById('absenceView').classList.contains('hidden')) { loadAbsenceDates(); loadAbsenceData(); }
        }
        
        function getConfig() { return currentSheet ? { SCRIPT_URL: currentSheet.url, SHEET_ID: currentSheet.sheetId, ACCESS: currentSheet.access, GROUPS: currentSheet.groups } : null; }
        function canWrite() { return currentAccess === 'full'; }
        function addLog(name, status, icon = '📌') {
            const container = DOM.logsList();
            if (!container) return;
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span>${icon}</span><span><strong>${escapeHtml(name)}</strong></span><span>${status}</span>`;
            container.insertBefore(entry, container.firstChild);
            while (container.children.length > 20) container.removeChild(container.lastChild);
        }
        function clearLogs() { const c = DOM.logsList(); if(c) c.innerHTML = '<div class="log-entry"><span>⏳</span><span>Ready</span></div>'; }
        function getToday() { const d = new Date(); return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`; }
        function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) : ''; }
        
        async function fetchFast(url, retries=1) {
            for(let i=0;i<retries;i++) {
                try {
                    const ctrl = new AbortController();
                    const tid = setTimeout(() => ctrl.abort(), 8000);
                    const res = await fetch(url, { signal: ctrl.signal });
                    clearTimeout(tid);
                    if(res.ok) return res;
                } catch(e) { if(i===retries-1) throw e; await new Promise(r=>setTimeout(r,500)); }
            }
        }
        
        async function loadDates() {
            const cfg = getConfig();
            if(!cfg) return;
            const cacheKey = `${cfg.SHEET_ID}_dates`;
            if(datesCache[cacheKey]) {
                const select = DOM.dateSelect();
                select.innerHTML = datesCache[cacheKey].map(d => `<option value="${escapeHtml(d)}">📅 ${escapeHtml(d)}</option>`).join('');
                toggleAutoDate();
                return;
            }
            try {
                const res = await fetchFast(`${cfg.SCRIPT_URL}?action=getDates&sheetId=${cfg.SHEET_ID}`);
                const text = await res.text();
                let dates;
                try { dates = JSON.parse(text); } catch(e) { addLog('System', text, '❌'); return; }
                datesCache[cacheKey] = dates;
                const select = DOM.dateSelect();
                select.innerHTML = dates.map(d => `<option value="${escapeHtml(d)}">📅 ${escapeHtml(d)}</option>`).join('');
                toggleAutoDate();
            } catch(e) { addLog('System', 'Failed dates', '❌'); }
        }
        
        function toggleAutoDate() {
            const isAuto = document.getElementById('autoDateToggle').checked;
            const select = DOM.dateSelect();
            if(isAuto && select.options.length) {
                select.disabled = true;
                const today = getToday();
                for(let i=0;i<select.options.length;i++) {
                    if(select.options[i].value === today) { select.selectedIndex = i; loadGroupStats(); break; }
                }
            } else select.disabled = false;
        }
        
        function onDateManuallySelected() {
            const auto = document.getElementById('autoDateToggle');
            if(auto.checked) { auto.checked = false; DOM.dateSelect().disabled = false; }
            loadGroupStats();
        }
        
        async function loadGroupStats() {
            const cfg = getConfig();
            if(!cfg) return;
            const date = DOM.dateSelect().value;
            if(!date) return;
            const cacheKey = `${cfg.SHEET_ID}_${date}_stats`;
            if(statsCache[cacheKey]) { renderGroupStats(statsCache[cacheKey]); return; }
            try {
                const res = await fetchFast(`${cfg.SCRIPT_URL}?action=getGroupStats&sheetId=${cfg.SHEET_ID}&date=${encodeURIComponent(date)}`);
                const text = await res.text();
                let stats;
                try { stats = JSON.parse(text); } catch(e) { addLog('System', text, '❌'); return; }
                if(!stats.error) { statsCache[cacheKey] = stats; renderGroupStats(stats); }
            } catch(e) { console.error(e); }
        }
        
        function renderGroupStats(stats) {
            const container = DOM.groupStatsContainer();
            if(!container) return;
            container.innerHTML = currentGroups.map(gn => {
                const g = stats[gn];
                if(!g) return '';
                return `<div class="group-card"><div class="group-title"><span>${gn}</span><span>${g.percentage}%</span></div>
                        <div class="group-stats"><div><div class="stat-number">${g.total}</div><div class="stat-label">Total</div></div>
                        <div><div class="stat-number present">${g.present}</div><div class="stat-label">Present</div></div>
                        <div><div class="stat-number absent">${g.absent}</div><div class="stat-label">Absent</div></div></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${g.percentage}%"></div></div></div>`;
            }).join('');
        }
        
        async function startScanner() {
            if(!canWrite()) { DOM.scannerStatus().innerHTML = '🔒 Read-only'; DOM.scannerStatus().style.display='block'; return; }
            document.getElementById('reader').style.display = 'block';
            DOM.scannerStatus().style.display = 'block';
            try {
                appState.scanner = new Html5Qrcode("reader");
                await appState.scanner.start({ facingMode: "environment" }, { fps: 8, qrbox: { width: 200, height: 200 } },
                    (text) => { if(!appState.isProcessing) processScan(text.trim()); }, () => {});
                DOM.scannerStatus().innerHTML = '📷 Ready';
            } catch(err) { addLog('System', 'Camera failed', '❌'); DOM.scannerStatus().innerHTML = '❌ Camera denied'; }
        }
        
        async function processScan(name, isBatch=false) {
            if(!canWrite()) return false;
            const cfg = getConfig();
            if(!cfg || !name || appState.scannedNamesSet.has(name) || appState.isProcessing) return false;
            appState.isProcessing = true;
            if(!isBatch) { addLog(name, 'processing', '⏳'); DOM.scannerStatus().innerHTML = `<span class="processing-pulse">⏳ ${escapeHtml(name)}</span>`; }
            const date = DOM.dateSelect().value;
            if(!date) { appState.isProcessing=false; return false; }
            try {
                const res = await fetchFast(`${cfg.SCRIPT_URL}?action=mark&sheetId=${cfg.SHEET_ID}&name=${encodeURIComponent(name)}&date=${encodeURIComponent(date)}`, 1);
                const text = await res.text();
                if(text.includes("Success")) {
                    addLog(name, '✓', '✅'); appState.scannedNamesSet.add(name); appState.scannedData.push({Name:name});
                    if(!isBatch) { DOM.scannerStatus().innerHTML = `✅ ${escapeHtml(name)}`; setTimeout(()=>{ DOM.scannerStatus().innerHTML='📷 Ready'; },1000); }
                    await loadGroupStats();
                } else if(text.includes("Already")) { addLog(name, 'already', '⚠️'); if(!isBatch){ DOM.scannerStatus().innerHTML=`⚠️ Already`; setTimeout(()=>{ DOM.scannerStatus().innerHTML='📷 Ready'; },800); } }
                else if(text.includes("not found")) { addLog(name, 'not found', '🔍'); if(!isBatch){ DOM.scannerStatus().innerHTML=`🔍 Not found`; setTimeout(()=>{ DOM.scannerStatus().innerHTML='📷 Ready'; },800); } }
                else { addLog(name, 'error', '❌'); }
                appState.isProcessing=false; return true;
            } catch(e) {
                addLog(name, 'queued', '📱');
                if(!isBatch && !appState.offlineQueue.includes(name)) appState.offlineQueue.push(name);
                updateQueueUI();
                appState.isProcessing=false;
                if(!isBatch) { DOM.scannerStatus().innerHTML='📱 Queued'; setTimeout(()=>{ DOM.scannerStatus().innerHTML='📷 Ready'; },800); }
                return false;
            }
        }
        
        function updateQueueUI() { DOM.queueCount().innerText = appState.offlineQueue.length; DOM.syncBtn().classList.toggle('hidden', appState.offlineQueue.length===0); }
        
        async function syncQueue() {
            if(!canWrite()) return;
            const cfg = getConfig();
            if(!cfg || appState.isSyncing || !appState.offlineQueue.length) return;
            appState.isSyncing = true;
            addLog('System', `Syncing ${appState.offlineQueue.length}`, '🔄');
            const date = DOM.dateSelect().value;
            if(date) {
                const toSync = [...appState.offlineQueue];
                for(let i=0;i<toSync.length;i+=30) {
                    const batch = toSync.slice(i,i+30);
                    try {
                        const res = await fetch(`${cfg.SCRIPT_URL}`, { method:'POST', body:JSON.stringify({ action:'batchMark', sheetId:cfg.SHEET_ID, names:batch, date }) });
                        const result = await res.json();
                        if(result.success) result.success.forEach(n=>{ if(!appState.scannedNamesSet.has(n)){ appState.scannedNamesSet.add(n); addLog(n,'✓','✅'); } });
                    } catch(e) {}
                }
                appState.offlineQueue = [];
                updateQueueUI();
                await loadGroupStats();
            }
            appState.isSyncing = false;
            addLog('System', 'Sync done', '✅');
        }
        
        function startBackgroundSync() {
            if(appState.syncInterval) clearInterval(appState.syncInterval);
            appState.syncInterval = setInterval(() => { if(appState.offlineQueue.length && navigator.onLine && appState.currentMode==='scan') syncQueue(); }, 8000);
        }
        
        async function handleBulkUpload() {
            if(!canWrite()) { alert('Read-only'); return; }
            const cfg = getConfig();
            if(!cfg) { alert('Select sheet first'); return; }
            const file = document.getElementById('fileInput').files[0];
            if(!file) { alert('Select file'); return; }
            try {
                const text = await file.text();
                let names = text.split(/\r?\n/).filter(l=>l.trim()).map(n=>n.split(',')[0].replace(/["']/g,'').trim()).filter(n=>n);
                names = [...new Map(names.map(n=>[n.toLowerCase(),n])).values()];
                if(!names.length) { alert('No valid names'); return; }
                document.getElementById('progressContainer').style.display='block';
                const upBtn = document.getElementById('uploadBtnAction');
                upBtn.disabled = true;
                let successful=0, already=0, notFound=0;
                const date = DOM.dateSelect().value;
                for(let i=0;i<names.length;i+=50) {
                    const batch = names.slice(i,i+50);
                    try {
                        const res = await fetch(`${cfg.SCRIPT_URL}`, { method:'POST', body:JSON.stringify({ action:'batchMark', sheetId:cfg.SHEET_ID, names:batch, date }) });
                        const txt = await res.text();
                        let result;
                        try { result = JSON.parse(txt); } catch(e) { notFound+=batch.length; continue; }
                        if(result.error) notFound+=batch.length;
                        else {
                            if(result.success) { successful+=result.success.length; result.success.forEach(n=>addLog(n,'✓','✅')); }
                            if(result.alreadyMarked) { already+=result.alreadyMarked.length; result.alreadyMarked.forEach(n=>addLog(n,'already','⚠️')); }
                            if(result.notFound) { notFound+=result.notFound.length; result.notFound.forEach(n=>addLog(n,'not found','🔍')); }
                        }
                    } catch(e) { notFound+=batch.length; }
                    const progress = ((i+batch.length)/names.length)*100;
                    document.getElementById('progressBar').style.width = `${progress}%`;
                    document.getElementById('uploadStats').innerHTML = `✓${successful} ⚠️${already} 🔍${notFound}`;
                }
                await loadGroupStats();
                addLog('System', `Done: +${successful}, ${already} already, ${notFound} missing`, '✅');
                upBtn.disabled = false;
                setTimeout(()=>{ document.getElementById('progressContainer').style.display='none'; document.getElementById('progressBar').style.width='0%'; document.getElementById('uploadStats').innerHTML=''; },2000);
            } catch(e) { addLog('System', 'Upload failed', '❌'); document.getElementById('uploadBtnAction').disabled=false; }
        }
        
        function exportToExcel() {
            if(!appState.scannedData.length) { alert('No data to export'); return; }
            const ws = XLSX.utils.aoa_to_sheet([['Name'], ...appState.scannedData.map(i=>[i.Name])]);
            ws['!cols'] = [{wch:30}];
            XLSX.writeFile(XLSX.utils.book_new(), `Attendance_${DOM.dateSelect().value.replace(/\//g,'-')}.xlsx`);
            addLog('System', `Exported ${appState.scannedData.length} names`, '📊');
        }
        
        async function showAbsenceExport() {
            const cfg = getConfig();
            if(!cfg) { alert('Select sheet first'); return; }
            document.getElementById('welcomeView').classList.add('hidden');
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('absenceView').classList.remove('hidden');
            document.getElementById('absenceSheetInfo').innerHTML = `📄 ${currentSheet.name} (${currentGroups.length} groups)`;
            await loadAbsenceDates();
        }
        
        async function loadAbsenceDates() {
            const cfg = getConfig();
            if(!cfg) return;
            try {
                const res = await fetchFast(`${cfg.SCRIPT_URL}?action=getDates&sheetId=${cfg.SHEET_ID}`);
                const dates = await res.json();
                const select = document.getElementById('absenceDateSelect');
                select.innerHTML = dates.map(d => `<option value="${escapeHtml(d)}">📅 ${escapeHtml(d)}</option>`).join('');
                const today = getToday();
                for(let i=0;i<select.options.length;i++) { if(select.options[i].value===today) { select.selectedIndex=i; break; } }
                await loadAbsenceData();
            } catch(e) { addLog('System', 'Failed dates', '❌'); }
        }
        
        async function loadAbsenceData() {
            const cfg = getConfig();
            if(!cfg) return;
            const date = document.getElementById('absenceDateSelect').value;
            if(!date) return;
            document.getElementById('absenceLoading').style.display='block';
            document.getElementById('absenceGroupsContainer').innerHTML='';
            document.getElementById('exportAbsenceBtn').style.display='none';
            try {
                const res = await fetchFast(`${cfg.SCRIPT_URL}?action=getAllAttendance&sheetId=${cfg.SHEET_ID}&date=${encodeURIComponent(date)}`);
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); } catch(e) { throw new Error(text); }
                if(data.error) throw new Error(data.error);
                absenceData = data;
                const container = document.getElementById('absenceGroupsContainer');
                container.innerHTML = currentGroups.map(gn => {
                    const g = data.groups[gn];
                    if(!g) return '';
                    return `<div class="group-card"><div class="group-title"><span>${gn}</span><span>${g.percentage}%</span></div>
                            <div class="group-stats"><div><div class="stat-number">${g.total}</div><div class="stat-label">Total</div></div>
                            <div><div class="stat-number present">${g.present}</div><div class="stat-label">Present</div></div>
                            <div><div class="stat-number absent">${g.absent}</div><div class="stat-label">Absent</div></div></div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${g.percentage}%"></div></div>
                            ${g.absent ? `<div style="margin-top:8px;"><strong>Absent (${g.absent}):</strong>${g.absentNames.map(n=>`<div style="padding:4px 8px; background:#fee2e2; margin:2px 0; border-radius:6px;">❌ ${escapeHtml(n)}</div>`).join('')}</div>` : '<div style="margin-top:8px;color:#27ae60;">✅ All present</div>'}
                        </div>`;
                }).join('');
                document.getElementById('exportAbsenceBtn').style.display='block';
            } catch(e) { document.getElementById('absenceGroupsContainer').innerHTML = `<div style="text-align:center;color:red;">Error: ${e.message}</div>`; }
            finally { document.getElementById('absenceLoading').style.display='none'; }
        }
        
        function exportAbsenceToExcel() {
            if(!absenceData) return;
            const wsData = [['Absence Report'], ['Date: ' + absenceData.date], []];
            for(const gn of currentGroups) {
                const g = absenceData.groups[gn];
                if(g && g.absentNames.length) {
                    wsData.push([`${gn} - Absent (${g.absentNames.length})`]);
                    g.absentNames.forEach(n=>wsData.push([n]));
                    wsData.push([]);
                } else if(g) wsData.push([`${gn} - All present ✅`], []);
            }
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            XLSX.writeFile(XLSX.utils.book_new(), `Absence_${absenceData.date.replace(/\//g,'-')}.xlsx`);
            addLog('System', 'Absence exported', '📊');
        }
        
        async function showApp(mode) {
            const cfg = getConfig();
            if(!cfg) { alert('Select sheet first'); return; }
            resetAppState();
            document.getElementById('welcomeView').classList.add('hidden');
            document.getElementById('absenceView').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('activeSheetInfo').innerHTML = `📄 ${currentSheet.name} | ${currentGroups.length} groups`;
            appState.currentMode = mode;
            if(mode === 'scan') {
                document.getElementById('modeTitle').innerText = '📸 Scanner';
                document.getElementById('fileSection').classList.add('hidden');
                await loadDates(); await loadGroupStats(); await startScanner(); startBackgroundSync();
                addLog('System', `Scanner ready - ${currentSheet.name}`, '📸');
            } else {
                if(!canWrite()) { alert('Read-only, upload disabled'); backToWelcome(); return; }
                document.getElementById('modeTitle').innerText = '📁 Upload';
                document.getElementById('fileSection').classList.remove('hidden');
                await loadDates(); await loadGroupStats();
                addLog('System', `Upload ready - ${currentSheet.name}`, '📁');
            }
        }
        
        function resetAppState() {
            if(appState.scanner) { try { appState.scanner.stop(); } catch(e) {} appState.scanner = null; }
            if(appState.syncInterval) clearInterval(appState.syncInterval);
            appState.scannedNamesSet.clear(); appState.scannedData = []; appState.offlineQueue = []; appState.isSyncing = false; appState.isProcessing = false;
        }
        
        function backToWelcome() {
            if(appState.scanner) { try { appState.scanner.stop(); } catch(e) {} appState.scanner = null; }
            if(appState.syncInterval) clearInterval(appState.syncInterval);
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('absenceView').classList.add('hidden');
            document.getElementById('welcomeView').classList.remove('hidden');
            loadUserSheets();
        }
        
        checkSavedSession();
    </script>
</body>
</html>
