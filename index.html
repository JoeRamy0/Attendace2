<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance Pro v11</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; background: #f0f2f5; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        #welcomeView { display: flex; flex-direction: column; gap: 15px; padding-top: 40px; }
        .welcome-btn { padding: 30px; font-size: 20px; border-radius: 15px; border: none; color: white; cursor: pointer; font-weight: bold; }
        #mainApp { display: none; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #f8f9fa; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
        .stat-val { font-size: 22px; font-weight: bold; color: var(--primary); }
        .date-container { background: #edf2f7; padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: left; }
        select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; font-weight: bold; }
        #status { margin-top: 10px; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 14px; min-height: 20px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        /* Critical: Reader must have a minimum height to show the camera feed */
        #reader { width: 100%; min-height: 300px; border-radius: 10px; overflow: hidden; margin-bottom: 10px; display: none; background: #000; }
        #scannedList { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; text-align: left; border-top: 1px solid #eee; }
        #scannedList li { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <div id="welcomeView">
        <h2>Attendance Pro ⛪</h2>
        <button class="welcome-btn" style="background:var(--primary)" onclick="showApp('scan')">📸 Start QR Scanner</button>
        <button class="welcome-btn" style="background:var(--success)" onclick="showApp('upload')">📁 Bulk Upload List</button>
    </div>

    <div id="mainApp">
        <h2 id="modeTitle">Mode</h2>
        <div class="stats-grid">
            <div class="stat-box"><div>Marked</div><span id="counter" class="stat-val">0</span></div>
            <div class="stat-box"><div>Total</div><span id="listTotal" class="stat-val">-</span></div>
        </div>

        <div class="date-container">
            <label style="font-size:12px; font-weight:bold;">Service Date:</label>
            <select id="dateSelect" onchange="resetLocalData()"></select>
        </div>

        <div id="reader"></div>
        <div id="status">Ready</div>

        <button onclick="location.reload()" style="background:#666; color:white; font-size: 12px; margin-top: 10px;">⬅ Back to Menu</button>
        
        <div style="margin-top:20px; font-weight:bold;">Recent Scans:</div>
        <ul id="scannedList"></ul>
    </div>
</div>

<script>
    // Update this after deployment!
    const MY_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwAxnQgxbxPrG-75bKT_mqHLalPYY2fueedzKgeJSDq2Ekh0viLd8PtkV_m1cBs7bIFSg/exec"; 
    const MY_SHEET_ID = "1eLBj6T5M8toC9nBgZt70elYYrRjWYkdWzTkeKx-k5zA";

    let scannedNamesSet = new Set(); 
    let html5QrCode = null;

    async function showApp(mode) {
        document.getElementById('welcomeView').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        await loadDates();
        if (mode === 'scan') {
            document.getElementById('modeTitle').innerText = "📸 QR Scanner";
            startScanner();
        }
    }

    async function loadDates() {
        try {
            const resp = await fetch(`${MY_SCRIPT_URL}?action=getDates&sheetId=${MY_SHEET_ID}`);
            const dates = await resp.json();
            const select = document.getElementById('dateSelect');
            select.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
        } catch(e) { setStatus("Sync Error: Check Script URL", "error"); }
    }

    function startScanner() {
        const readerDiv = document.getElementById('reader');
        readerDiv.style.display = 'block';
        
        html5QrCode = new Html5Qrcode("reader");
        
        const config = { 
            fps: 10, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        };

        // Attempt to start camera
        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            (decodedText) => {
                processScan(decodedText.trim());
            }
        ).catch(err => {
            console.error("Camera Error: ", err);
            setStatus("Camera Access Denied or Not Found", "error");
        });
    }

    async function processScan(name) {
        if (scannedNamesSet.has(name)) return;

        // Visual feedback that we are working
        setStatus(`Syncing: ${name}...`, "warning");

        try {
            const date = document.getElementById('dateSelect').value;
            const fetchUrl = `${MY_SCRIPT_URL}?action=mark&sheetId=${MY_SHEET_ID}&name=${encodeURIComponent(name)}&date=${encodeURIComponent(date)}`;
            
            const res = await fetch(fetchUrl);
            const msg = await res.text();
            
            if (msg.includes("Success") || msg.includes("Already")) {
                scannedNamesSet.add(name);
                updateUI(name, msg);
            } else {
                setStatus(msg, "error");
            }
        } catch (e) {
            setStatus("Network Error. Check Internet.", "error");
        }
    }

    function updateUI(name, msg) {
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        document.getElementById('counter').innerText = scannedNamesSet.size;
        setStatus(msg, "success");
        
        const li = document.createElement('li');
        li.innerHTML = `<span>${time}</span> <strong>${name}</strong>`;
        document.getElementById('scannedList').prepend(li);
    }

    function setStatus(msg, className) {
        const s = document.getElementById('status');
        s.className = className; 
        s.innerText = msg;
    }

    function resetLocalData() {
        scannedNamesSet.clear();
        document.getElementById('scannedList').innerHTML = "";
        document.getElementById('counter').innerText = "0";
    }
</script>
</body>
</html>
