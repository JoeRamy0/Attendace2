<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance Pro v11</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; background: #f0f2f5; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        #welcomeView { display: flex; flex-direction: column; gap: 15px; padding-top: 40px; }
        .welcome-btn { padding: 30px; font-size: 20px; border-radius: 15px; border: none; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        #mainApp { display: none; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #f8f9fa; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
        .stat-val { font-size: 22px; font-weight: bold; color: var(--primary); }
        .date-container { background: #edf2f7; padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: left; }
        select, button, input[type="file"] { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; font-weight: bold; box-sizing: border-box; cursor: pointer; }
        #status { margin-top: 10px; padding: 12px; border-radius: 8px; font-weight: bold; min-height: 24px; font-size: 14px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 10px; display: none; background: #000; }
        #scannedList { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; text-align: left; }
        #scannedList li { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="card">
    <div id="welcomeView">
        <h2>Attendance Pro ⛪</h2>
        <button class="welcome-btn" style="background:var(--primary)" onclick="showApp('scan')">📸 Start QR Scanner</button>
        <button class="welcome-btn" style="background:var(--success)" onclick="showApp('upload')">📁 Bulk Upload List</button>
    </div>

    <div id="mainApp">
        <h2 id="modeTitle">Mode</h2>
        <div class="stats-grid">
            <div class="stat-box"><div>Marked</div><span id="counter" class="stat-val">0</span></div>
            <div class="stat-box"><div>Total</div><span id="listTotal" class="stat-val">0</span></div>
        </div>

        <div class="date-container">
            <label style="font-size:12px; font-weight:bold;">Service Date:</label>
            <select id="dateSelect" onchange="resetLocalData()"></select>
        </div>
        
        <div id="fileSection" style="display:none; padding:15px; border:2px dashed #ccc; border-radius:10px;">
            <input type="file" id="fileInput" accept=".txt,.csv">
            <button id="uploadBtn" style="background:var(--success); color:white;" onclick="handleBulkUpload()">🚀 Sync CSV List</button>
        </div>

        <div id="reader"></div>
        <div id="status">Ready</div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px;">
            <button style="background:#1f7244; color:white;" onclick="exportToExcel()">📊 Excel</button>
            <button style="background:#e74c3c; color:white;" onclick="exportToPDF()">📕 PDF</button>
        </div>
        <button onclick="location.reload()" style="background:#666; color:white; font-size: 12px; margin-top: 10px;">⬅ Main Menu</button>
        
        <ul id="scannedList"></ul>
    </div>
</div>

<script>
    // Replace these with your actual details
    const MY_SCRIPT_URL = "YOUR_DEPLOYED_WEB_APP_URL"; 
    const MY_SHEET_ID = "1eLBj6T5M8toC9nBgZt70elYYrRjWYkdWzTkeKx-k5zA";

    let scannedData = [];
    let scannedNamesSet = new Set(); 
    let html5QrCode = null;

    async function showApp(mode) {
        document.getElementById('welcomeView').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        await loadDates();
        if (mode === 'scan') {
            document.getElementById('modeTitle').innerText = "📸 QR Scanner";
            startScanner();
        } else {
            document.getElementById('modeTitle').innerText = "📁 Bulk Upload";
            document.getElementById('fileSection').style.display = 'block';
        }
    }

    async function loadDates() {
        try {
            const resp = await fetch(`${MY_SCRIPT_URL}?action=getDates&sheetId=${MY_SHEET_ID}`);
            const dates = await resp.json();
            const select = document.getElementById('dateSelect');
            select.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
        } catch(e) { setStatus("Sync Error", "error"); }
    }

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            (decodedText) => processScan(decodedText.trim())
        ).catch(err => {
            setStatus("Camera Error: Check Permissions", "error");
            console.error(err);
        });
    }

    async function processScan(name) {
        const cleanName = name.replace(/"/g, '').trim();
        if (scannedNamesSet.has(cleanName)) return;

        setStatus(`Checking: ${cleanName}...`, "warning");
        try {
            const date = document.getElementById('dateSelect').value;
            const res = await fetch(`${MY_SCRIPT_URL}?action=mark&sheetId=${MY_SHEET_ID}&name=${encodeURIComponent(cleanName)}&date=${encodeURIComponent(date)}`);
            const msg = await res.text();
            
            if (msg.includes("Success") || msg.includes("Already Marked")) {
                scannedNamesSet.add(cleanName);
                addToList(cleanName);
                setStatus(msg, "success");
            } else {
                setStatus(msg, "error");
            }
        } catch (e) { setStatus("Network Error", "error"); }
    }

    function addToList(name) {
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        scannedData.push({ Name: name, Time: time });
        document.getElementById('counter').innerText = scannedNamesSet.size;
        const li = document.createElement('li');
        li.innerHTML = `<span>${time}</span> <strong>${name}</strong>`;
        document.getElementById('scannedList').prepend(li);
    }

    function setStatus(msg, className) {
        const s = document.getElementById('status');
        s.className = className; s.innerText = msg;
    }

    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(scannedData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Attendance");
        XLSX.writeFile(wb, "Attendance.xlsx");
    }

    function resetLocalData() {
        scannedNamesSet.clear();
        scannedData = [];
        document.getElementById('scannedList').innerHTML = "";
        document.getElementById('counter').innerText = "0";
    }
</script>
</body>
</html>
