<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Pro v7</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<style>
:root { --primary:#2c3e50; --success:#27ae60; --excel:#1f7244; --pdf:#e74c3c; --warning:#f39c12;}
body {font-family:Segoe UI; background:#f0f2f5; text-align:center;}
.card {background:white;padding:20px;border-radius:15px;max-width:500px;margin:auto;}
#status{margin-top:10px;padding:10px;border-radius:8px;font-weight:bold;}
.success{background:#d4edda;}
.error{background:#f8d7da;}
.warning{background:#fff3cd;}
</style>
</head>

<body>

<div class="card">
<h2>Attendance Pro ⛪</h2>

<select id="dateSelect"></select>

<input type="file" id="fileInput">
<button onclick="handleBulkUpload()">Upload</button>

<div id="reader"></div>
<div id="status">Ready</div>

<button onclick="exportToExcel()">Excel</button>
<button onclick="exportToPDF()">PDF</button>

<ul id="scannedList"></ul>
</div>

<script>
const MY_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwAxnQgxbxPrG-75bKT_mqHLalPYY2fueedzKgeJSDq2Ekh0viLd8PtkV_m1cBs7bIFSg/exec";
const MY_SHEET_ID = "1eLBj6T5M8toC9nBgZt70elYYrRjWYkdWzTkeKx-k5zA";

let scannedData = [];
let scannedNamesSet = new Set();
let amiriFont = "";

/* -------------------- FONT -------------------- */
async function loadArabicFont() {
    const url = "https://cdn.jsdelivr.net/gh/alif-type/amiri@main/fonts/ttf/Amiri-Regular.ttf";
    const res = await fetch(url);
    const buffer = await res.arrayBuffer();
    amiriFont = btoa(String.fromCharCode(...new Uint8Array(buffer)));
}
loadArabicFont();

/* -------------------- HELPERS -------------------- */
function normalizeName(name){
    return name
        .replace(/\s+/g,' ')
        .replace(/[أإآ]/g,'ا')
        .replace(/ى/g,'ي')
        .trim();
}

function fixArabic(text){
    return text.split('').reverse().join('');
}

function setStatus(msg,type){
    const s=document.getElementById("status");
    s.className=type;
    s.innerText=msg;
}

/* -------------------- LOAD DATES -------------------- */
async function loadDates(){
    const res = await fetch(`${MY_SCRIPT_URL}?action=getDates&sheetId=${MY_SHEET_ID}`);
    const dates = await res.json();

    const select=document.getElementById("dateSelect");
    select.innerHTML = dates.map(d=>`<option>${d}</option>`).join('');

    // ✅ FIXED AUTO DATE
    const today = new Date().toLocaleDateString('en-US');
    for(let i=0;i<select.options.length;i++){
        if(select.options[i].value.trim()===today){
            select.selectedIndex=i;
            break;
        }
    }
}
loadDates();

/* -------------------- SCANNER -------------------- */
function startScanner(){
    const scanner=new Html5Qrcode("reader");
    scanner.start({facingMode:"environment"}, {fps:10,qrbox:250},
        (name)=>processScan(name)
    );
}
startScanner();

/* -------------------- PROCESS -------------------- */
async function processScan(rawName){
    let name = normalizeName(rawName);

    if(scannedNamesSet.has(name)) return;

    setStatus(`Processing: ${name}...`,"warning");

    try{
        const date=document.getElementById("dateSelect").value;

        const res = await fetch(`${MY_SCRIPT_URL}?action=mark&sheetId=${MY_SHEET_ID}&name=${encodeURIComponent(name)}&date=${encodeURIComponent(date)}&t=${Date.now()}`);

        const msg = await res.text();

        if(msg.includes("Success") || msg.includes("Already")){
            scannedNamesSet.add(name);
            addToList(name);
            setStatus(msg,"success");
        }else{
            setStatus(`Not Found: ${name}`,"error");
        }

    }catch(e){
        setStatus("Error: "+name,"error");
    }
}

/* -------------------- LIST -------------------- */
function addToList(name){
    const time=new Date().toLocaleTimeString();
    scannedData.push({Name:name,Time:time});

    const li=document.createElement("li");
    li.innerText = `${time} - ${name}`;
    document.getElementById("scannedList").prepend(li);
}

/* -------------------- BULK -------------------- */
async function handleBulkUpload(){
    const file=document.getElementById("fileInput").files[0];
    if(!file) return alert("Choose file");

    const text=await file.text();
    const names=text.split(/\r?\n/).map(n=>normalizeName(n)).filter(n=>n);

    for(let i=0;i<names.length;i++){
        await processScan(names[i]);
        await new Promise(r=>setTimeout(r,1000)); // ✅ FIX RATE LIMIT
    }

    setStatus("Upload Done","success");
}

/* -------------------- PDF -------------------- */
function exportToPDF(){
    if(!scannedData.length) return alert("No data");

    const {jsPDF}=window.jspdf;
    const doc=new jsPDF();

    if(amiriFont){
        doc.addFileToVFS("Amiri.ttf",amiriFont);
        doc.addFont("Amiri.ttf","Amiri","normal");
        doc.setFont("Amiri");
    }

    const body=scannedData.map(d=>[d.Time, fixArabic(d.Name)]);

    doc.autoTable({
        head:[['Time','Name']],
        body:body,
        styles:{halign:'right',font:"Amiri"}
    });

    doc.save("Attendance.pdf");
}

/* -------------------- EXCEL -------------------- */
function exportToExcel(){
    const ws=XLSX.utils.json_to_sheet(scannedData);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Attendance");
    XLSX.writeFile(wb,"Attendance.xlsx");
}
</script>

</body>
</html>
