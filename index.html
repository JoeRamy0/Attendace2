<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance Pro v12</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; --excel: #1f7244; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: #f0f2f5; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        
        #welcomeView { display: flex; flex-direction: column; gap: 12px; padding: 20px 0; }
        .w-btn { padding: 22px; font-size: 18px; border-radius: 15px; border: none; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        
        #mainApp { display: none; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #f8f9fa; padding: 12px; border-radius: 12px; border: 1px solid #eee; }
        .stat-val { font-size: 24px; font-weight: bold; color: var(--primary); }

        .date-box { background: #edf2f7; padding: 12px; border-radius: 12px; margin-bottom: 15px; text-align: left; }
        select, button, input[type="file"] { width: 100%; padding: 14px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; font-weight: bold; box-sizing: border-box; }

        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; min-height: 280px; margin-bottom: 10px; }
        #status { padding: 12px; border-radius: 10px; font-weight: bold; min-height: 20px; font-size: 14px; margin-bottom: 10px; }
        
        .success { background: #d4edda; color: #155724; }
        .warning { background: #fff3cd; color: #856404; }
        .error { background: #f8d7da; color: #721c24; }

        #progressWrap { width: 100%; background: #eee; height: 10px; border-radius: 5px; margin: 10px 0; display: none; overflow: hidden; }
        #progressBar { width: 0%; height: 100%; background: var(--success); transition: width 0.2s; }

        #scannedList { list-style: none; padding: 0; margin-top: 15px; max-height: 200px; overflow-y: auto; border-top: 1px solid #eee; }
        #scannedList li { padding: 10px; border-bottom: 1px solid #f9f9f9; display: flex; justify-content: space-between; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <div id="welcomeView">
        <h2 style="margin:0 0 10px 0;">Attendance Pro ⛪</h2>
        <button class="w-btn" style="background:var(--primary)" onclick="showApp('scan')">📸 QR Scanner</button>
        <button class="w-btn" style="background:var(--success)" onclick="showApp('upload')">📁 Bulk Upload</button>
    </div>

    <div id="mainApp">
        <div class="stats-grid">
            <div class="stat-box">Marked<br><span id="counter" class="stat-val">0</span></div>
            <div class="stat-box">Queue<br><span id="listTotal" class="stat-val">0</span></div>
        </div>

        <div class="date-box">
            <label style="font-size:11px; font-weight:bold; color:#666;">SERVICE DATE</label>
            <select id="dateSelect" onchange="resetLocal()"></select>
        </div>

        <div id="fileSection" style="display:none; padding:10px; border:2px dashed #ccc; border-radius:15px; margin-bottom:15px;">
            <input type="file" id="fileInput" accept=".csv,.txt">
            <div id="progressWrap"><div id="progressBar"></div></div>
            <button id="uploadBtn" style="background:var(--success); color:white;" onclick="handleBulk()">🚀 Start Fast Sync</button>
        </div>

        <div id="reader"></div>
        <div id="status">Ready</div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <button style="background:var(--excel); color:white;" onclick="exportExcel()">📊 Excel</button>
            <button style="background:var(--danger); color:white;" onclick="exportPDF()">📕 PDF</button>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:#999; margin-top:15px; text-decoration:underline;">⬅ Back to Menu</button>
        
        <ul id="scannedList"></ul>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwAxnQgxbxPrG-75bKT_mqHLalPYY2fueedzKgeJSDq2Ekh0viLd8PtkV_m1cBs7bIFSg/exec"; 
    const SHEET_ID = "1eLBj6T5M8toC9nBgZt70elYYrRjWYkdWzTkeKx-k5zA";

    let scannedData = [];
    let scannedSet = new Set(); 
    let queue = [];
    let isProcessing = false;

    async function showApp(mode) {
        document.getElementById('welcomeView').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        await loadDates();
        if (mode === 'scan') {
            startScanner();
            setInterval(syncQueue, 3000); // Check queue every 3 seconds
        } else {
            document.getElementById('fileSection').style.display = 'block';
        }
    }

    async function loadDates() {
        try {
            const resp = await fetch(`${API_URL}?action=getDates&sheetId=${SHEET_ID}`);
            const dates = await resp.json();
            const select = document.getElementById('dateSelect');
            const today = new Date().toLocaleDateString('en-US'); // M/D/YYYY
            
            select.innerHTML = dates.map(d => `<option value="${d}" ${d === today ? 'selected' : ''}>${d}</option>`).join('');
        } catch(e) { setStatus("Sync Error", "error"); }
    }

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (name) => processInput(name.trim()));
    }

    async function handleBulk() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return alert("Pick a file!");
        const text = await file.text();
        const names = text.split(/\r?\n/).filter(l => l.trim()).map(l => l.split(',')[0].replace(/"/g,'').trim());
        
        document.getElementById('progressWrap').style.display = 'block';
        document.getElementById('uploadBtn').disabled = true;

        const batchSize = 5;
        for (let i = 0; i < names.length; i += batchSize) {
            const batch = names.slice(i, i + batchSize);
            await Promise.all(batch.map(n => processInput(n)));
            document.getElementById('progressBar').style.width = ((i + batch.length) / names.length * 100) + "%";
        }
        setStatus("Bulk Finish!", "success");
    }

    // THIS IS THE SPEED SECRET: Optimistic UI
    function processInput(name) {
        if (scannedSet.has(name)) return;
        
        // 1. Mark on UI instantly
        scannedSet.add(name);
        addToUIList(name);
        
        // 2. Add to background queue
        queue.push(name);
        document.getElementById('listTotal').innerText = queue.length;
        setStatus("Marked locally...", "warning");
    }

    async function syncQueue() {
        if (isProcessing || queue.length === 0) return;
        isProcessing = true;
        
        const name = queue[0];
        const date = document.getElementById('dateSelect').value;
        
        try {
            const res = await fetch(`${API_URL}?action=mark&sheetId=${SHEET_ID}&name=${encodeURIComponent(name)}&date=${encodeURIComponent(date)}`);
            const txt = await res.text();
            
            if (txt.includes("Success") || txt.includes("Already")) {
                queue.shift(); // Remove from queue only if successful
                document.getElementById('listTotal').innerText = queue.length;
                setStatus("Last Sync: " + name, "success");
            }
        } catch (e) { setStatus("Waiting for internet...", "error"); }
        
        isProcessing = false;
    }

    function addToUIList(name) {
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        scannedData.push({ Name: name, Time: time });
        document.getElementById('counter').innerText = scannedSet.size;
        const li = document.createElement('li');
        li.innerHTML = `<span>${time}</span> <strong>${name}</strong>`;
        document.getElementById('scannedList').prepend(li);
    }

    function setStatus(m, c) { const s = document.getElementById('status'); s.className = c; s.innerText = m; }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(scannedData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Today");
        XLSX.writeFile(wb, `Attendance_${document.getElementById('dateSelect').value}.xlsx`);
    }

    function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(`Attendance: ${document.getElementById('dateSelect').value}`, 14, 15);
        doc.autoTable({ head: [['Name', 'Time']], body: scannedData.map(d => [d.Name, d.Time]), startY: 20 });
        doc.save("Attendance.pdf");
    }

    function resetLocal() {
        scannedSet.clear(); scannedData = []; queue = [];
        document.getElementById('scannedList').innerHTML = "";
        document.getElementById('counter').innerText = "0";
        document.getElementById('listTotal').innerText = "0";
    }
</script>
</body>
</html>
