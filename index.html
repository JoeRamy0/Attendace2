<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Pro + Smart Sync</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --csv: #f39c12; --warning: #e67e22; --error: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; background: #f0f2f5; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #f8f9fa; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
        .stat-label { font-size: 12px; color: #666; display: block; }
        .stat-val { font-size: 20px; font-weight: bold; color: var(--primary); }

        .date-container { background: #edf2f7; padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: left; border: 1px solid #cbd5e0; }
        .auto-toggle { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font-size: 14px; font-weight: bold; color: var(--primary); }
        
        select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        
        .btn-scan { background: var(--primary); }
        .btn-csv { background: var(--csv); margin-top: 10px; }
        .btn-sync { background: var(--warning); display: none; }

        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-top: 10px; border: 2px solid var(--primary); display: none; }
        #status { margin-top: 10px; padding: 12px; border-radius: 8px; font-weight: bold; min-height: 20px; font-size: 14px; }
        
        .list-container { margin-top: 20px; text-align: right; background: #fff; border-radius: 10px; padding: 10px; border: 1px solid #eee; }
        #scannedList { list-style: none; padding: 0; margin: 0; max-height: 180px; overflow-y: auto; }
        #scannedList li { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 13px; color: #333; }
        
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .offline { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<div class="card">
    <h2>St Joseph Attendance Pro ⛪</h2>
    <h4>Created by:Youssef Ramy</h4>

    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-label">Present</span>
            <span id="counter" class="stat-val">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">In Queue</span>
            <span id="queueCounter" class="stat-val">0</span>
        </div>
    </div>

    <div class="date-container">
        <div class="auto-toggle">
            <span>Auto-Select Today</span>
            <input type="checkbox" id="autoDateToggle" checked onchange="toggleAutoDate()">
        </div>
        <select id="dateSelect"></select>
    </div>
    
    <button class="btn-scan" onclick="startScanner()">Open Scanner</button>
    <button id="syncBtn" class="btn-sync" onclick="syncQueue()">Syncing Queue...</button>
    <button class="btn-csv" onclick="exportToCSV()">📥 Export List (.CSV)</button>

    <div id="reader"></div>
    <div id="status">Ready</div>

    <div class="list-container">
        <strong>Scanned Names Today:</strong>
        <ul id="scannedList"></ul>
    </div>
</div>

<script>
    const MY_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwAxnQgxbxPrG-75bKT_mqHLalPYY2fueedzKgeJSDq2Ekh0viLd8PtkV_m1cBs7bIFSg/exec"; 
    const MY_SHEET_ID = "1eLBj6T5M8toC9nBgZt70elYYrRjWYkdWzTkeKx-k5zA";

    let scannedNames = new Set(); 
    let offlineQueue = [];
    let isSyncing = false;

    window.onload = async () => {
        try {
            const resp = await fetch(`${MY_SCRIPT_URL}?action=getDates&sheetId=${MY_SHEET_ID}`);
            const dates = await resp.json();
            const select = document.getElementById('dateSelect');
            
            select.innerHTML = dates.map(d => `<option value="${d.trim()}">${d.trim()}</option>`).join('');
            
            toggleAutoDate();
        } catch(e) { setStatus("Offline Mode: Sync unavailable", "offline"); }
        
        setInterval(syncQueue, 5000);
    };

    function toggleAutoDate() {
        const isAuto = document.getElementById('autoDateToggle').checked;
        const select = document.getElementById('dateSelect');
        
        if (isAuto && select.options.length > 0) {
            select.disabled = true;
            select.style.opacity = "0.6";
            
            const now = new Date();
            const todayKey = now.getFullYear() + "-" + (now.getMonth() + 1) + "-" + now.getDate();

            let found = false;
            for (let i = 0; i < select.options.length; i++) {
                let optVal = select.options[i].value.trim();
                let optDate = new Date(optVal);
                
                if (!isNaN(optDate)) {
                    const optKey = optDate.getFullYear() + "-" + (optDate.getMonth() + 1) + "-" + optDate.getDate();
                    if (todayKey === optKey) {
                        select.selectedIndex = i;
                        found = true;
                        break;
                    }
                }
            }
            
            // Backup text-based match
            if(!found) {
                const simpleToday = (now.getMonth() + 1) + '/' + now.getDate() + '/' + now.getFullYear();
                for (let i = 0; i < select.options.length; i++) {
                    if (select.options[i].value.trim() === simpleToday) {
                        select.selectedIndex = i;
                        found = true;
                        break;
                    }
                }
            }

            if(found) {
                setStatus("Auto-selected: " + select.value, "success");
            } else {
                setStatus("Today's date not found in sheet list.", "error");
            }
        } else {
            select.disabled = false;
            select.style.opacity = "1";
        }
    }

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (name) => processScan(name.trim()));
    }

    async function processScan(name) {
        if (scannedNames.has(name)) {
            setStatus("Already Scanned: " + name, "error");
            return;
        }
        
        setStatus("Processing: " + name, "");

        try {
            const res = await fetch(`${MY_SCRIPT_URL}?action=mark&sheetId=${MY_SHEET_ID}&name=${encodeURIComponent(name)}&date=${encodeURIComponent(document.getElementById('dateSelect').value)}`);
            const text = await res.text();
            
            if (text.includes("Success") || text.includes("Already Marked")) {
                addToList(name);
                setStatus(text, "success");
                window.navigator.vibrate(100);
            } else {
                setStatus(text, "error");
            }
        } catch (e) {
            addToQueue(name);
        }
    }

    function setStatus(msg, className) {
        const s = document.getElementById('status');
        s.className = className;
        s.innerText = msg;
    }

    function addToList(name) {
        if(scannedNames.has(name)) return;
        scannedNames.add(name);
        document.getElementById('counter').innerText = scannedNames.size;
        const li = document.createElement('li');
        li.innerHTML = `<span>${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span> <strong>${name}</strong>`;
        document.getElementById('scannedList').prepend(li);
    }

    function addToQueue(name) {
        if(offlineQueue.includes(name) || scannedNames.has(name)) return;
        offlineQueue.push(name);
        updateQueueUI();
        setStatus("Offline! Saved to Queue", "offline");
    }

    function updateQueueUI() {
        document.getElementById('queueCounter').innerText = offlineQueue.length;
        document.getElementById('syncBtn').style.display = offlineQueue.length > 0 ? 'block' : 'none';
    }

    async function syncQueue() {
        if (isSyncing || offlineQueue.length === 0) return;
        isSyncing = true;
        const nameToSync = offlineQueue[0];
        try {
            const res = await fetch(`${MY_SCRIPT_URL}?action=mark&sheetId=${MY_SHEET_ID}&name=${encodeURIComponent(nameToSync)}&date=${encodeURIComponent(document.getElementById('dateSelect').value)}`);
            if (res.ok) {
                const text = await res.text();
                if (text.includes("Success") || text.includes("Already Marked")) {
                    offlineQueue.shift();
                    addToList(nameToSync);
                    updateQueueUI();
                }
            }
        } catch (e) { console.log("Still offline..."); }
        isSyncing = false;
    }

    function exportToCSV() {
        if (scannedNames.size === 0) return alert("No names to export!");
        let csvContent = "data:text/csv;charset=utf-8,Name,Time\n";
        scannedNames.forEach(name => {
            csvContent += `"${name}","${new Date().toLocaleTimeString()}"\n`;
        });
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", `Attendance_${document.getElementById('dateSelect').value}.csv`);
        link.click();
    }
</script>

</body>
</html>
