<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>St. Joseph Attendance Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); overflow: hidden; margin-bottom: 20px; }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .card-body { padding: 20px; }
        .app-title { font-size: 28px; font-weight: 700; }
        .creator-credit { font-size: 10px; opacity: 0.7; margin-top: 8px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #1e293b; }
        .form-group input { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 16px; font-size: 14px; }
        .login-btn, .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .error-message { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .user-profile { background: #f8fafc; border-radius: 20px; padding: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 60px; height: 60px; background: linear-gradient(135deg, #2c7da0 0%, #1f5e7a 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 600; color: white; }
        .user-details { flex: 1; }
        .user-name { font-size: 18px; font-weight: 700; }
        .user-role-badge { display: inline-block; background: #2c7da0; color: white; padding: 3px 10px; border-radius: 20px; font-size: 10px; margin-top: 6px; }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 40px; font-size: 12px; cursor: pointer; }
        .sheet-selector { background: #f8fafc; border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .current-sheet { background: linear-gradient(135deg, #2c7da0 0%, #1f5e7a 100%); color: white; padding: 8px 12px; border-radius: 12px; font-size: 12px; text-align: center; margin-bottom: 10px; }
        .sheet-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: white; border-radius: 12px; margin-bottom: 8px; border: 1px solid #e2e8f0; cursor: pointer; }
        .sheet-item.active { border-color: #667eea; background: #f5f3ff; }
        .sheet-name { font-weight: 600; }
        .access-badge { padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; }
        .access-badge.full { background: #d1fae5; color: #059669; }
        .welcome-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        .welcome-btn { flex: 1; padding: 15px 8px; background: linear-gradient(135deg, #2c7da0 0%, #1f5e7a 100%); color: white; border: none; border-radius: 16px; cursor: pointer; text-align: center; }
        .welcome-btn.disabled { opacity: 0.5; cursor: not-allowed; }
        .group-card { background: #f8fafc; border-radius: 16px; padding: 12px; margin-bottom: 10px; }
        .group-title { font-weight: 700; display: flex; justify-content: space-between; margin-bottom: 8px; }
        .group-stats { display: flex; gap: 15px; justify-content: space-around; margin: 10px 0; }
        .stat-number { font-size: 20px; font-weight: 700; }
        .stat-number.present { color: #27ae60; }
        .stat-number.absent { color: #e74c3c; }
        .stat-label { font-size: 10px; color: #64748b; }
        .progress-bar { background: #e2e8f0; border-radius: 10px; height: 6px; overflow: hidden; }
        .progress-fill { background: #27ae60; height: 100%; transition: width 0.3s; }
        .date-section { background: #f8fafc; padding: 15px; border-radius: 16px; margin-bottom: 15px; }
        .auto-toggle { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px; }
        .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: 0.3s; border-radius: 24px; }
        .toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: 0.3s; }
        input:checked + .toggle-slider { background-color: #27ae60; }
        input:checked + .toggle-slider:before { transform: translateX(20px); }
        select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; }
        .logs-container { background: #f8fafc; border-radius: 16px; padding: 12px; margin: 15px 0; max-height: 250px; overflow-y: auto; }
        .logs-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; font-weight: 600; }
        .log-entry { padding: 8px; margin-bottom: 6px; border-radius: 10px; font-size: 12px; display: flex; gap: 8px; background: white; }
        .btn-primary { background: linear-gradient(135deg, #2c7da0 0%, #1f5e7a 100%); color: white; }
        .btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .hidden { display: none; }
        #reader { width: 100%; border-radius: 16px; display: none; background: #000; margin: 10px 0; }
        .scanner-status { background: #f1f5f9; padding: 12px; border-radius: 12px; text-align: center; margin: 10px 0; display: none; }
        .upload-section { border: 2px dashed #e2e8f0; border-radius: 16px; padding: 20px; text-align: center; margin: 15px 0; }
        .file-input-label { display: inline-block; padding: 10px 24px; background: linear-gradient(135deg, #2c7da0 0%, #1f5e7a 100%); color: white; border-radius: 40px; cursor: pointer; }
        input[type="file"] { display: none; }
        .progress-container { background: #e2e8f0; border-radius: 10px; height: 6px; margin: 10px 0; display: none; }
        .progress-bar { width: 0%; height: 100%; background: #27ae60; border-radius: 10px; transition: width 0.3s; }
        .processing-pulse { animation: pulse 1s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
<div class="container">
    <!-- Login View -->
    <div class="card" id="loginView">
        <div class="card-header">
            <div class="app-title">⛪ St. Joseph Attendance Pro</div>
            <div class="creator-credit">Created by: Youssef Ramy</div>
        </div>
        <div class="card-body">
            <div id="loginError" class="error-message hidden"></div>
            <div class="form-group">
                <label>👤 Username</label>
                <input type="text" id="username" placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            <button class="login-btn" onclick="login()">🔐 Login</button>
        </div>
    </div>

    <!-- Welcome View -->
    <div class="card hidden" id="welcomeView">
        <div class="card-header">
            <div class="app-title">⛪ St. Joseph Attendance Pro</div>
            <div class="creator-credit">Created by: Youssef Ramy</div>
        </div>
        <div class="card-body">
            <div class="user-profile">
                <div class="user-avatar" id="userAvatar">👤</div>
                <div class="user-details">
                    <div class="user-name" id="displayName"></div>
                    <div class="user-role-badge" id="displayRole"></div>
                </div>
                <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            </div>
            <div class="sheet-selector">
                <div id="currentSheetDisplay" class="current-sheet"></div>
                <div id="sheetListContainer"></div>
            </div>
            <div class="welcome-buttons">
                <button class="welcome-btn scanner" id="scannerBtn" onclick="showApp('scan')">📸 QR Scanner</button>
                <button class="welcome-btn upload" id="uploadBtn" onclick="showApp('upload')">📁 Bulk Upload</button>
                <button class="welcome-btn absence" id="absenceBtn" onclick="showAbsenceExport()">📋 Export Absence</button>
            </div>
        </div>
    </div>

    <!-- Main App View -->
    <div class="card hidden" id="mainApp">
        <div class="card-header">
            <h2 id="modeTitle">Scanner Mode</h2>
            <p id="modeDescription">Scan QR code to mark attendance</p>
            <div id="activeSheetInfo"></div>
        </div>
        <div class="card-body">
            <div id="groupStatsContainer"></div>
            <div class="date-section">
                <div class="auto-toggle">
                    <span>📅 Auto-select today</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="autoDateToggle" checked onchange="toggleAutoDate()">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <select id="dateSelect" onchange="onDateManuallySelected()"></select>
            </div>
            <div id="reader"></div>
            <div class="scanner-status" id="scannerStatus">📷 Ready to scan</div>
            <div id="fileSection" class="hidden">
                <div class="upload-section">
                    <label class="file-input-label">📁 Choose File<input type="file" id="fileInput" accept=".txt,.csv"></label>
                    <div id="fileName" style="margin-top:10px; font-size:12px;">No file selected</div>
                    <div class="progress-container" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>
                    <button class="btn btn-primary" id="uploadBtnAction" onclick="handleBulkUpload()" style="margin-top:10px;">🚀 Start Upload</button>
                    <div id="uploadStats" style="font-size:11px; margin-top:8px;"></div>
                </div>
            </div>
            <div class="logs-container">
                <div class="logs-header"><span>📋 Activity Log</span><button onclick="clearLogs()" style="background:none; border:none; cursor:pointer;">Clear</button></div>
                <div id="logsList"><div class="log-entry"><span>⏳</span><span>Ready to start</span></div></div>
            </div>
            <div class="button-group">
                <button class="btn btn-primary" onclick="exportToExcel()">📊 Export Excel</button>
                <button class="btn btn-secondary" onclick="backToWelcome()">🏠 Back</button>
            </div>
            <button id="syncBtn" class="btn btn-primary hidden" onclick="syncQueue()">📤 Sync Queue (<span id="queueCount">0</span>)</button>
        </div>
    </div>

    <!-- Absence View -->
    <div class="card hidden" id="absenceView">
        <div class="card-header"><h2>📋 Absence Report</h2><div id="absenceSheetInfo"></div></div>
        <div class="card-body">
            <div class="date-section">
                <label>Select Date:</label>
                <select id="absenceDateSelect" onchange="loadAbsenceData()" style="margin-top:10px;"></select>
            </div>
            <div id="absenceLoading" style="display:none; text-align:center; padding:20px;">⏳ Loading...</div>
            <div id="absenceGroupsContainer"></div>
            <div class="button-group" style="margin-top:15px;">
                <button class="btn btn-primary" id="exportAbsenceBtn" onclick="exportAbsenceToExcel()" style="display:none;">📥 Export Absence</button>
                <button class="btn btn-secondary" onclick="backToWelcome()">🏠 Back</button>
            </div>
        </div>
    </div>
</div>

<script>
// ============ CONFIGURATION ============
// !!! REPLACE THIS URL WITH YOUR DEPLOYED APPS SCRIPT WEB APP URL !!!
const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3IS7k1C1FmERWIra4OtNRCTVL04Injd3Y8_2J_kIEGlUQ1MW_t1o1E7ICGGT8r3eXcg/exec";

// ============ GLOBAL STATE ============
let sessionToken = null;
let currentUser = null;
let allSheets = [];
let currentSheet = null;
let currentAccess = null;
let currentGroups = [];
let sessionTimeout = null;

let appState = {
    scanner: null,
    scannedNamesSet: new Set(),
    scannedData: [],
    offlineQueue: [],
    isSyncing: false,
    currentMode: null,
    syncInterval: null,
    isProcessing: false
};

let absenceData = null;

// ============ API HELPERS ============
async function apiGet(action, params) {
    let url = APP_SCRIPT_URL + '?action=' + encodeURIComponent(action);
    if (sessionToken) url += '&token=' + encodeURIComponent(sessionToken);
    for (let k in params) if (params[k]) url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
    const resp = await fetch(url);
    const text = await resp.text();
    try { return JSON.parse(text); } catch(e) { return { error: 'Invalid response' }; }
}

async function apiPost(action, data) {
    const resp = await fetch(APP_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, token: sessionToken, ...data })
    });
    const text = await resp.text();
    try { return JSON.parse(text); } catch(e) { return { error: 'Invalid response' }; }
}

// ============ LOGIN ============
async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('loginError');
    const btn = document.querySelector('.login-btn');
    
    if (!username || !password) {
        errorDiv.classList.remove('hidden');
        errorDiv.innerHTML = '❌ Please enter both username and password';
        return;
    }
    
    btn.disabled = true;
    btn.textContent = '⏳ Logging in...';
    
    // Use POST instead of GET
    const result = await apiPost('login', { username, password });
    
    if (result.error) {
        errorDiv.classList.remove('hidden');
        errorDiv.innerHTML = '❌ ' + result.error;
        btn.disabled = false;
        btn.textContent = '🔐 Login';
        return;
    }
    
    if (result.success) {
        sessionToken = result.token;
        currentUser = result.user;
        allSheets = result.sheets || [];
        document.getElementById('loginView').classList.add('hidden');
        document.getElementById('welcomeView').classList.remove('hidden');
        document.getElementById('userAvatar').innerHTML = currentUser.username.charAt(0).toUpperCase();
        document.getElementById('displayName').innerHTML = currentUser.username;
        document.getElementById('displayRole').innerHTML = currentUser.role;
        loadUserSheets();
        addLog('System', 'Welcome ' + currentUser.username + '!', '✅');
        resetSessionTimeout();
    }
    
    btn.disabled = false;
    btn.textContent = '🔐 Login';
}

function logout() {
    if (sessionTimeout) clearTimeout(sessionTimeout);
    sessionToken = null;
    currentUser = null;
    currentSheet = null;
    allSheets = [];
    if (appState.scanner) try { appState.scanner.stop(); } catch(e) {}
    if (appState.syncInterval) clearInterval(appState.syncInterval);
    document.getElementById('welcomeView').classList.add('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('absenceView').classList.add('hidden');
    document.getElementById('loginView').classList.remove('hidden');
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
}

function resetSessionTimeout() {
    if (sessionTimeout) clearTimeout(sessionTimeout);
    sessionTimeout = setTimeout(() => {
        if (currentUser) { alert('Session expired. Please login again.'); logout(); }
    }, 30 * 60 * 1000);
}

// ============ SHEET FUNCTIONS ============
function loadUserSheets() {
    const container = document.getElementById('sheetListContainer');
    const display = document.getElementById('currentSheetDisplay');
    if (!currentUser || !allSheets.length) {
        container.innerHTML = '<div class="loading">No sheets available</div>';
        display.innerHTML = 'No sheets';
        document.getElementById('scannerBtn').classList.add('disabled');
        document.getElementById('uploadBtn').classList.add('disabled');
        document.getElementById('absenceBtn').classList.add('disabled');
        return;
    }
    document.getElementById('scannerBtn').classList.remove('disabled');
    document.getElementById('uploadBtn').classList.remove('disabled');
    document.getElementById('absenceBtn').classList.remove('disabled');
    if (!currentSheet && allSheets.length) { currentSheet = allSheets[0]; currentAccess = currentSheet.access; currentGroups = currentSheet.groups; }
    if (display && currentSheet) display.innerHTML = '📄 Active: ' + currentSheet.name + ' (' + currentGroups.length + ' groups)';
    let html = '';
    for (let i = 0; i < allSheets.length; i++) {
        let s = allSheets[i];
        let active = (currentSheet && currentSheet.sheetId === s.sheetId) ? 'active' : '';
        html += `<div class="sheet-item ${active}" onclick="selectSheet(${i})">
            <div><div class="sheet-name">${escapeHtml(s.name)}</div><div class="sheet-details">${s.groups.length} groups</div></div>
            <div class="access-badge ${s.access}">${s.access === 'full' ? 'Full' : 'View'}</div>
        </div>`;
    }
    container.innerHTML = html;
}

function selectSheet(idx) {
    currentSheet = allSheets[idx];
    currentAccess = currentSheet.access;
    currentGroups = currentSheet.groups;
    loadUserSheets();
    addLog('System', 'Switched to: ' + currentSheet.name, '🔄');
    if (!document.getElementById('mainApp').classList.contains('hidden')) { loadDates(); loadGroupStats(); }
    if (!document.getElementById('absenceView').classList.contains('hidden')) { loadAbsenceDates(); loadAbsenceData(); }
}

function getCurrentConfig() {
    return currentSheet ? { SHEET_ID: currentSheet.sheetId, ACCESS: currentSheet.access, GROUPS: currentSheet.groups } : null;
}
function canWrite() { return currentAccess === 'full'; }

// ============ DATA LOADING ============
async function loadDates() {
    const cfg = getCurrentConfig(); if (!cfg) return;
    const res = await apiGet('getDates', { sheetId: cfg.SHEET_ID });
    if (!res.error && Array.isArray(res)) {
        const sel = document.getElementById('dateSelect');
        sel.innerHTML = res.map(d => `<option value="${escapeHtml(d)}">📅 ${escapeHtml(d)}</option>`).join('');
        toggleAutoDate();
    }
}

function toggleAutoDate() {
    const auto = document.getElementById('autoDateToggle').checked;
    const sel = document.getElementById('dateSelect');
    if (auto && sel.options.length) {
        sel.disabled = true;
        const today = getToday();
        for (let i = 0; i < sel.options.length; i++) {
            if (sel.options[i].value === today) { sel.selectedIndex = i; loadGroupStats(); break; }
        }
    } else { sel.disabled = false; }
}

function onDateManuallySelected() {
    const auto = document.getElementById('autoDateToggle');
    if (auto.checked) { auto.checked = false; document.getElementById('dateSelect').disabled = false; }
    loadGroupStats();
}

async function loadGroupStats() {
    const cfg = getCurrentConfig(); if (!cfg) return;
    const date = document.getElementById('dateSelect').value; if (!date) return;
    const res = await apiGet('getGroupStats', { sheetId: cfg.SHEET_ID, date: date });
    if (!res.error) renderGroupStats(res);
}

function renderGroupStats(stats) {
    const cont = document.getElementById('groupStatsContainer');
    if (!cont) return;
    let html = '';
    for (let g of currentGroups) {
        let group = stats[g];
        if (!group) continue;
        let pct = group.percentage || 0;
        html += `<div class="group-card">
            <div class="group-title"><span>${g}</span><span>${pct}%</span></div>
            <div class="group-stats">
                <div><div class="stat-number">${group.total}</div><div class="stat-label">Total</div></div>
                <div><div class="stat-number present">${group.present}</div><div class="stat-label">Present</div></div>
                <div><div class="stat-number absent">${group.absent}</div><div class="stat-label">Absent</div></div>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
        </div>`;
    }
    cont.innerHTML = html;
}

// ============ SCANNER ============
async function startScanner() {
    if (!canWrite()) {
        document.getElementById('scannerStatus').style.display = 'block';
        document.getElementById('scannerStatus').innerHTML = '🔒 Read-only mode. Cannot mark attendance.';
        return;
    }
    document.getElementById('reader').style.display = 'block';
    document.getElementById('scannerStatus').style.display = 'block';
    try {
        appState.scanner = new Html5Qrcode("reader");
        await appState.scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } },
            (text) => { if (!appState.isProcessing) processScan(text.trim()); },
            () => {});
        document.getElementById('scannerStatus').innerHTML = '📷 Ready - Point at QR code';
    } catch(err) { addLog('System', 'Camera access failed', '❌'); }
}

async function processScan(name, isBatch = false) {
    if (!canWrite()) return false;
    const cfg = getCurrentConfig(); if (!cfg) return false;
    if (!name || appState.scannedNamesSet.has(name) || appState.isProcessing) return false;
    appState.isProcessing = true;
    if (!isBatch) { addLog(name, 'processing', '⏳'); document.getElementById('scannerStatus').innerHTML = '⏳ Processing...'; }
    const date = document.getElementById('dateSelect').value; if (!date) { appState.isProcessing = false; return false; }
    const res = await apiGet('mark', { sheetId: cfg.SHEET_ID, name: name, date: date });
    if (res.success) {
        addLog(name, 'success', '✅');
        appState.scannedNamesSet.add(name);
        appState.scannedData.push({ Name: name, Date: date });
        if (!isBatch) { document.getElementById('scannerStatus').innerHTML = '✅ Marked'; setTimeout(() => { document.getElementById('scannerStatus').innerHTML = '📷 Ready'; }, 1500); }
        await loadGroupStats();
    } else if (res.error === 'Already marked') {
        addLog(name, 'already', '⚠️');
        if (!isBatch) { document.getElementById('scannerStatus').innerHTML = '⚠️ Already marked'; setTimeout(() => { document.getElementById('scannerStatus').innerHTML = '📷 Ready'; }, 1500); }
    } else {
        addLog(name, res.error || 'error', '❌');
        if (!isBatch) { document.getElementById('scannerStatus').innerHTML = '❌ ' + (res.error || 'Error'); setTimeout(() => { document.getElementById('scannerStatus').innerHTML = '📷 Ready'; }, 1500); }
    }
    appState.isProcessing = false;
    return res.success;
}

function updateQueueUI() {
    document.getElementById('queueCount').innerText = appState.offlineQueue.length;
    document.getElementById('syncBtn').classList.toggle('hidden', !appState.offlineQueue.length);
}

async function syncQueue() {
    if (!canWrite()) return;
    const cfg = getCurrentConfig(); if (!cfg || appState.isSyncing || !appState.offlineQueue.length) return;
    appState.isSyncing = true;
    addLog('System', 'Syncing ' + appState.offlineQueue.length + ' items', '🔄');
    const date = document.getElementById('dateSelect').value;
    if (date) {
        const toSync = [...appState.offlineQueue];
        for (let i = 0; i < toSync.length; i += 20) {
            const batch = toSync.slice(i, i + 20);
            const res = await apiPost('batchMark', { sheetId: cfg.SHEET_ID, names: batch, date: date });
            if (!res.error && res.success) {
                for (let n of res.success) {
                    if (!appState.scannedNamesSet.has(n)) {
                        appState.scannedNamesSet.add(n);
                        appState.scannedData.push({ Name: n, Date: date });
                        addLog(n, 'success', '✅');
                    }
                }
            }
        }
        appState.offlineQueue = [];
        updateQueueUI();
        addLog('System', 'Sync completed', '✅');
        await loadGroupStats();
    }
    appState.isSyncing = false;
}

function startBackgroundSync() {
    if (appState.syncInterval) clearInterval(appState.syncInterval);
    appState.syncInterval = setInterval(() => {
        if (appState.offlineQueue.length && navigator.onLine && appState.currentMode === 'scan') syncQueue();
    }, 5000);
}

// ============ BULK UPLOAD ============
async function handleBulkUpload() {
    if (!canWrite()) { alert('Read-only mode. Cannot upload.'); return; }
    const cfg = getCurrentConfig(); if (!cfg) { alert('Please select a sheet first!'); return; }
    const file = document.getElementById('fileInput').files[0];
    if (!file) { alert('Please select a file!'); return; }
    try {
        const text = await file.text();
        let lines = text.split(/\r?\n/);
        let names = [];
        for (let l of lines) {
            let n = l.trim();
            if (n) {
                n = n.split(',')[0].trim();
                n = n.replace(/^["']|["']$/g, '');
                if (n) names.push(n);
            }
        }
        let unique = [], seen = new Set();
        for (let n of names) { let low = n.toLowerCase(); if (!seen.has(low)) { seen.add(low); unique.push(n); } }
        names = unique;
        if (!names.length) { alert('No valid names found!'); return; }
        if (names.length > 500 && !confirm(`You're about to upload ${names.length} names. Continue?`)) return;
        document.getElementById('progressContainer').style.display = 'block';
        const uploadBtn = document.getElementById('uploadBtnAction');
        uploadBtn.disabled = true;
        let processed = 0, success = 0, already = 0, notFound = 0;
        const start = Date.now();
        addLog('System', 'Uploading ' + names.length + ' names', '📁');
        const date = document.getElementById('dateSelect').value;
        for (let i = 0; i < names.length; i += 50) {
            const batch = names.slice(i, i + 50);
            const res = await apiPost('batchMark', { sheetId: cfg.SHEET_ID, names: batch, date: date });
            if (res.error) {
                for (let n of batch) addLog(n, 'error', '❌');
                notFound += batch.length;
            } else {
                if (res.success) for (let n of res.success) { addLog(n, 'success', '✅'); success++; appState.scannedData.push({ Name: n, Date: date }); }
                if (res.alreadyMarked) for (let n of res.alreadyMarked) { addLog(n, 'already', '⚠️'); already++; }
                if (res.notFound) for (let n of res.notFound) { addLog(n, 'notfound', '🔍'); notFound++; }
            }
            processed += batch.length;
            document.getElementById('progressBar').style.width = (processed / names.length * 100) + '%';
            const speed = (processed / ((Date.now() - start) / 1000)).toFixed(1);
            document.getElementById('uploadStats').innerHTML = `✓ ${success} | ⚠️ ${already} | 🔍 ${notFound} | ⚡ ${speed}/s`;
        }
        await loadGroupStats();
        addLog('System', `Completed: +${success} new, ${already} already, ${notFound} not found`, '✅');
        uploadBtn.disabled = false;
        setTimeout(() => {
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('uploadStats').innerHTML = '';
        }, 3000);
    } catch(err) { addLog('System', 'Upload failed: ' + err.message, '❌'); document.getElementById('uploadBtnAction').disabled = false; }
}

function exportToExcel() {
    if (!appState.scannedData.length) { alert('No data to export!'); return; }
    const ws = XLSX.utils.aoa_to_sheet([['Name', 'Date'], ...appState.scannedData.map(i => [i.Name, i.Date])]);
    ws['!cols'] = [{wch:30}, {wch:12}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Attendance');
    XLSX.writeFile(wb, `Attendance_${document.getElementById('dateSelect').value.replace(/\//g, '-')}.xlsx`);
    addLog('System', `Exported ${appState.scannedData.length} names`, '📊');
}

// ============ ABSENCE ============
async function showAbsenceExport() {
    if (!getCurrentConfig()) { alert('Please select a sheet first!'); return; }
    document.getElementById('welcomeView').classList.add('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('absenceView').classList.remove('hidden');
    document.getElementById('absenceSheetInfo').innerHTML = `📄 ${currentSheet.name} (${currentGroups.length} groups)`;
    await loadAbsenceDates();
}

async function loadAbsenceDates() {
    const cfg = getCurrentConfig(); if (!cfg) return;
    const res = await apiGet('getDates', { sheetId: cfg.SHEET_ID });
    if (!res.error && Array.isArray(res)) {
        const sel = document.getElementById('absenceDateSelect');
        sel.innerHTML = res.map(d => `<option value="${escapeHtml(d)}">📅 ${escapeHtml(d)}</option>`).join('');
        const today = getToday();
        for (let i = 0; i < sel.options.length; i++) { if (sel.options[i].value === today) { sel.selectedIndex = i; break; } }
        await loadAbsenceData();
    }
}

async function loadAbsenceData() {
    const cfg = getCurrentConfig(); if (!cfg) return;
    const date = document.getElementById('absenceDateSelect').value; if (!date) return;
    document.getElementById('absenceLoading').style.display = 'block';
    document.getElementById('absenceGroupsContainer').innerHTML = '';
    document.getElementById('exportAbsenceBtn').style.display = 'none';
    const res = await apiGet('getAllAttendance', { sheetId: cfg.SHEET_ID, date: date });
    if (!res.error) {
        absenceData = res;
        renderAbsenceGroups(res);
        document.getElementById('exportAbsenceBtn').style.display = 'block';
    } else {
        document.getElementById('absenceGroupsContainer').innerHTML = `<div style="text-align:center;color:red;">Error: ${res.error}</div>`;
    }
    document.getElementById('absenceLoading').style.display = 'none';
}

function renderAbsenceGroups(data) {
    const cont = document.getElementById('absenceGroupsContainer');
    if (!cont) return;
    let html = '';
    for (let g of currentGroups) {
        let group = data.groups[g];
        if (!group) continue;
        let pct = group.percentage || 0;
        let absentList = '';
        for (let n of group.absentNames) absentList += `<div style="padding:8px 12px; background:#fee2e2; margin:4px 0; border-radius:8px;">❌ ${escapeHtml(n)}</div>`;
        html += `<div class="group-card">
            <div class="group-title"><span>${g}</span><span>${pct}%</span></div>
            <div class="group-stats">
                <div><div class="stat-number">${group.total}</div><div class="stat-label">Total</div></div>
                <div><div class="stat-number present">${group.present}</div><div class="stat-label">Present</div></div>
                <div><div class="stat-number absent">${group.absent}</div><div class="stat-label">Absent</div></div>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
            ${group.absent > 0 ? `<div style="margin-top:12px;"><strong>📋 Absent List (${group.absent}):</strong><div style="margin-top:8px;">${absentList}</div></div>` : '<div style="margin-top:12px; color:#27ae60;">✅ All students are present</div>'}
        </div>`;
    }
    cont.innerHTML = html;
}

function exportAbsenceToExcel() {
    if (!absenceData) return;
    let wsData = [['Absence Report'], ['Date: ' + absenceData.date], []];
    for (let g of currentGroups) {
        let group = absenceData.groups[g];
        if (group && group.absentNames.length) {
            wsData.push([g + ' - Absent Students (' + group.absentNames.length + ')']);
            for (let n of group.absentNames) wsData.push([n]);
            wsData.push([]);
        } else if (group) wsData.push([g + ' - All students present ✅'], []);
    }
    wsData.push([], ['Summary']);
    for (let g of currentGroups) {
        let group = absenceData.groups[g];
        if (group) wsData.push([g, `Total: ${group.total}`, `Present: ${group.present}`, `Absent: ${group.absent}`, `Percentage: ${group.percentage}%`]);
    }
    const ws = XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols'] = [{wch:25}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Absence Report');
    XLSX.writeFile(wb, `Absence_Report_${absenceData.date.replace(/\//g, '-')}.xlsx`);
    addLog('System', 'Absence report exported', '📊');
}

// ============ UI HELPERS ============
function addLog(name, status, icon = '📌') {
    const cont = document.getElementById('logsList');
    if (!cont) return;
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span>${icon}</span><span><strong>${escapeHtml(name)}</strong></span><span>${status}</span>`;
    cont.insertBefore(entry, cont.firstChild);
    while (cont.children.length > 30) cont.removeChild(cont.lastChild);
}

function clearLogs() { document.getElementById('logsList').innerHTML = '<div class="log-entry"><span>⏳</span><span>Ready to start</span></div>'; }

function getToday() { const d = new Date(); return (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear(); }

function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

// ============ NAVIGATION ============
async function showApp(mode) {
    if (!getCurrentConfig()) { alert('Please select a sheet first!'); return; }
    resetState();
    document.getElementById('welcomeView').classList.add('hidden');
    document.getElementById('absenceView').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('activeSheetInfo').innerHTML = `📄 ${currentSheet.name} (${currentAccess} access) | ${currentGroups.length} groups`;
    appState.currentMode = mode;
    if (mode === 'scan') {
        document.getElementById('modeTitle').innerText = '📸 Scanner Mode';
        document.getElementById('modeDescription').innerText = canWrite() ? 'Scan QR code to mark attendance' : 'Read-only mode - cannot mark attendance';
        document.getElementById('fileSection').classList.add('hidden');
        await loadDates(); await loadGroupStats(); await startScanner(); startBackgroundSync();
        addLog('System', `Scanner ready - ${currentSheet.name}`, '📸');
    } else {
        if (!canWrite()) { alert('⚠️ You have read-only access. Bulk upload is disabled.'); backToWelcome(); return; }
        document.getElementById('modeTitle').innerText = '📁 Bulk Upload Mode';
        document.getElementById('modeDescription').innerText = 'Upload file to mark multiple names';
        document.getElementById('fileSection').classList.remove('hidden');
        await loadDates(); await loadGroupStats();
        addLog('System', `Upload mode ready - ${currentSheet.name}`, '📁');
    }
    document.getElementById('fileInput').onchange = function(e) { document.getElementById('fileName').innerHTML = e.target.files[0]?.name || 'No file selected'; };
}

function resetState() {
    if (appState.scanner) try { appState.scanner.stop(); } catch(e) {}
    if (appState.syncInterval) clearInterval(appState.syncInterval);
    appState.scannedNamesSet.clear(); appState.scannedData = []; appState.offlineQueue = []; appState.isSyncing = false; appState.isProcessing = false;
}

function backToWelcome() {
    if (appState.scanner) try { appState.scanner.stop(); } catch(e) {}
    if (appState.syncInterval) clearInterval(appState.syncInterval);
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('absenceView').classList.add('hidden');
    document.getElementById('welcomeView').classList.remove('hidden');
    loadUserSheets(); resetSessionTimeout();
}

document.addEventListener('click', resetSessionTimeout);
document.addEventListener('keypress', resetSessionTimeout);
</script>
